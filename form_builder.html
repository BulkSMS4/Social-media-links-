<script>
const $ = id => document.getElementById(id);

// Arrays to store dynamic elements
let extraButtons = [], embedLinks = [], customFields = [], dragging = null, dx = 0, dy = 0;

// -------------------------
// Update SEO & OG Meta Tags
// -------------------------
function updateSEOMeta() {
  // Page Title
  document.title = $("seoTitle").value;

  // Meta Description
  let metaDesc = document.querySelector('meta[name="description"]');
  if (!metaDesc) {
    metaDesc = document.createElement("meta");
    metaDesc.name = "description";
    document.head.appendChild(metaDesc);
  }
  metaDesc.content = $("metaDesc").value;

  // Open Graph Image
  let ogImage = document.querySelector('meta[property="og:image"]');
  if (!ogImage) {
    ogImage = document.createElement("meta");
    ogImage.setAttribute("property", "og:image");
    document.head.appendChild(ogImage);
  }
  ogImage.content = $("ogImage").value;

  // OG Title
  let ogTitle = document.querySelector('meta[property="og:title"]');
  if (!ogTitle) {
    ogTitle = document.createElement("meta");
    ogTitle.setAttribute("property", "og:title");
    document.head.appendChild(ogTitle);
  }
  ogTitle.content = $("seoTitle").value;

  // OG Description
  let ogDesc = document.querySelector('meta[property="og:description"]');
  if (!ogDesc) {
    ogDesc = document.createElement("meta");
    ogDesc.setAttribute("property", "og:description");
    document.head.appendChild(ogDesc);
  }
  ogDesc.content = $("metaDesc").value;
}

// -------------------------
// Custom Fields
// -------------------------
function addCustomField() {
  customFields.push({ label: "New Field", type: "text" });
  renderCustomFields();
  renderPreview();
}
function clearCustomFields() { customFields.length=0; renderCustomFields(); renderPreview(); }
function renderCustomFields(){
  const wrap=$("customFieldsWrap"); wrap.innerHTML="";
  customFields.forEach((fld,i)=>{
    const div=document.createElement("div");
    div.style.border="1px solid #ccc"; div.style.padding="8px"; div.style.marginTop="6px"; div.style.borderRadius="6px";
    div.innerHTML=`
      <label>Field Label</label>
      <input value="${fld.label}" oninput="customFields[${i}].label=this.value; renderPreview()">
      <label>Type</label>
      <select onchange="customFields[${i}].type=this.value; renderPreview()">
        <option value="text" ${fld.type==="text"?"selected":""}>Text</option>
        <option value="number" ${fld.type==="number"?"selected":""}>Number</option>
        <option value="email" ${fld.type==="email"?"selected":""}>Email</option>
        <option value="password" ${fld.type==="password"?"selected":""}>Password</option>
      </select>
    `;
    wrap.appendChild(div);
  });
}

// Default example gallery items
let galleryItems = [
  {
    img: "https://picsum.photos/400/250",
    link: "https://example.com",
    mask: "Visit Website",
    desc: "Example gallery item description"
  },
  {
    img: "https://picsum.photos/401/250",
    link: "https://google.com",
    mask: "Open Google",
    desc: "Second example item"
  }
];

function addGalleryItem() {
  galleryItems.push({
    img: "https://picsum.photos/402/250",
    link: "https://example.com",
    mask: "Learn More",
    desc: "New gallery item"
  });
  renderGalleryInputs();
  renderPreview();
}

function deleteGalleryItem(index) {
  if (!confirm("Delete this gallery item?")) return;
  galleryItems.splice(index, 1);
  renderGalleryInputs();
  renderPreview();
}

function clearGalleryItems() {
  if (!confirm("Clear ALL gallery items? This cannot be undone.")) return;
  galleryItems = [];
  renderGalleryInputs();
  renderPreview();
}

function renderGalleryInputs() {
  const wrap = $("galleryItemsWrap");
  wrap.innerHTML = "";

  galleryItems.forEach((g, i) => {
    const div = document.createElement("div");
    div.style.border = "1px solid #ccc";
    div.style.padding = "12px";
    div.style.marginBottom = "12px";
    div.style.borderRadius = "10px";
    div.style.background = "#fafafa";

    div.innerHTML = `
      <label>Image URL</label>
      <input value="${g.img}" oninput="galleryItems[${i}].img=this.value; renderPreview()">

      <label>Real Link (hidden)</label>
      <input value="${g.link}" oninput="galleryItems[${i}].link=this.value; renderPreview()">

      <label>Masked Link Text</label>
      <input value="${g.mask}" oninput="galleryItems[${i}].mask=this.value; renderPreview()">

      <label>Description</label>
      <textarea rows="3" oninput="galleryItems[${i}].desc=this.value; renderPreview()">${g.desc}</textarea>

      <label>Link Alignment</label>
      <select onchange="galleryItems[${i}].linkAlign=this.value; renderPreview()">
        <option value="top" ${g.linkAlign==='top'?'selected':''}>Top</option>
        <option value="bottom" ${!g.linkAlign || g.linkAlign==='bottom'?'selected':''}>Bottom</option>
        <option value="left" ${g.linkAlign==='left'?'selected':''}>Left</option>
        <option value="center" ${g.linkAlign==='center'?'selected':''}>Center</option>
        <option value="right" ${g.linkAlign==='right'?'selected':''}>Right</option>
      </select>

      <button
        style="background:#c62828;color:#fff;margin-top:10px"
        onclick="deleteGalleryItem(${i})">
        ❌ Delete This Item
      </button>
    `;

    wrap.appendChild(div);
  });
}

// -------------------------
// Extra Buttons
// -------------------------
function addExtraButton(){
  if(!$("newBtnShow").checked) return;
  extraButtons.push({
    id:"b"+Math.random().toString(36).slice(2),
    text:$("newBtnText").value, link:$("newBtnLink").value,
    color:$("newBtnColor").value, size:parseInt($("newBtnSize").value)||44,
    x:40,y:60, show:$("newBtnShow").checked
  }); renderPreview();
}
function clearExtraButtons(){ extraButtons=[]; renderPreview(); }

// -------------------------
// Embed Links
// -------------------------
function addEmbedLink(){ if(!$("embedShow").checked) return; embedLinks.push({ text:$("embedText").value, url:$("embedURL").value, desc:$("embedDesc").value, show:$("embedShow").checked }); renderPreview(); }
function clearEmbedLinks(){ embedLinks=[]; renderPreview(); }

// -------------------------
// Preview
// -------------------------
function renderPreview() {
  try {
    const p = $("preview");
    p.innerHTML = "";
    p.style.position = "relative";
    p.style.minHeight = "520px";

// -------------------------
// Background Layer
// -------------------------
const bgLayer = document.createElement("div");
bgLayer.style.position = "absolute";
bgLayer.style.top = 0;
bgLayer.style.left = 0;
bgLayer.style.width = "100%";
bgLayer.style.height = "100%";
bgLayer.style.zIndex = 0;
bgLayer.style.overflow = "hidden";

// Add a dedicated container for YouTube API
const ytContainer = document.createElement("div");
ytContainer.id = "ytBg";
ytContainer.style.position = "absolute";
ytContainer.style.top = "0";
ytContainer.style.left = "0";
ytContainer.style.width = "100%";
ytContainer.style.height = "100%";
ytContainer.style.zIndex = "-1";
bgLayer.appendChild(ytContainer);

// Background Image
const bgImage = $("bgImageURL").value;
if (bgImage) {
  const img = document.createElement("img");
  img.src = bgImage;
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.objectFit = $("bgSize").value || "cover";
  img.style.position = "absolute";
  img.style.top = 0;
  img.style.left = 0;
  bgLayer.appendChild(img);
}

// Background Video / YouTube
const bgVideo = $("bgVideoURL").value;
if (bgVideo) {
  if (bgVideo.includes("youtube.com") || bgVideo.includes("youtu.be")) {
    if (typeof YT !== "undefined" && YT && YT.Player) {
      let videoId = bgVideo.split("v=")[1] || bgVideo.split("youtu.be/")[1];
      if (videoId.includes("&")) videoId = videoId.split("&")[0];

      // Remove previous player if exists
      if (window.ytPlayer) window.ytPlayer.destroy();

      window.ytPlayer = new YT.Player('ytBg', {
        videoId: videoId,
        playerVars: { 
          autoplay: 1, 
          loop: 1, 
          playlist: videoId, 
          mute: 1, 
          controls: 0, 
          modestbranding: 1,
          showinfo: 0,
          rel: 0
        },
        events: { onReady: event => event.target.playVideo() }
      });
    }
  } else {
    // MP4/WebM support
    const video = document.createElement("video");
    video.src = bgVideo;
    video.autoplay = true;
    video.loop = true;
    video.muted = true;
    video.playsInline = true; 
    video.style.width = "100%";
    video.style.height = "100%";
    video.style.objectFit = "cover";
    video.style.position = "absolute";
    video.style.top = 0;
    video.style.left = 0;
    video.style.zIndex = "-1";
    bgLayer.appendChild(video);
  }
}

p.appendChild(bgLayer);
    // -------------------------
    // Main container
    // -------------------------
    const c = document.createElement("div");
    c.style.position = "relative";
    c.style.zIndex = 1;
    c.style.width = "100%";
    c.style.padding = "16px";
    c.style.color = $("textColor").value || "#222";
    c.style.backgroundColor = $("bgColor").value || "#fff";

    // Avatar / Logo / Banner
    const addImage = (id, width, round = false, margin = "auto") => {
      const url = $(id).value;
      if (!url) return;
      const img = document.createElement("img");
      img.src = url;
      img.style.width = width;
      if (round) img.style.borderRadius = "50%";
      img.style.display = "block";
      img.style.margin = margin;
      c.appendChild(img);
    };
    addImage("avatarURL", "90px", true);
    addImage("logoURL", "140px");
    addImage("bannerURL", "100%", false, "10px auto");

   // Title / Subtitle / Description
const titleEl = document.createElement("h2");
titleEl.textContent = $("title").value;
titleEl.style.textAlign = "center";
titleEl.style.color = $("titleColor").value || "#000";
c.appendChild(titleEl);

const subtitleEl = document.createElement("p");
subtitleEl.textContent = $("subtitle").value;
subtitleEl.style.textAlign = "center";
subtitleEl.style.color = $("subtitleColor").value || "#555";
c.appendChild(subtitleEl);

const descEl = document.createElement("p");
descEl.textContent = $("description").value;
c.appendChild(descEl);

// -------------------------
// Gallery Images from Media Section
// -------------------------
const galleryImages = $("galleryImages").value.split(",").map(i => i.trim()).filter(Boolean);
if (galleryImages.length) {
  const galleryDiv = document.createElement("div");
  galleryDiv.style.display = "flex";
  galleryDiv.style.flexWrap = "wrap";
  galleryDiv.style.gap = "10px";
  galleryDiv.style.margin = "12px 0";

  galleryImages.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.style.width = "120px";
    img.style.height = "auto";
    img.style.borderRadius = "6px";
    img.style.objectFit = "cover";
    galleryDiv.appendChild(img);
  });

  c.appendChild(galleryDiv);
}
    // -------------------------
    // Warning
    // -------------------------
    if ($("enableWarning").checked && $("warningPosition").value !== "none") {
      const warn = document.createElement("p");
      warn.style.color = "#b71c1c";
      warn.style.textAlign = $("warningPosition").value;
      warn.textContent = $("warning").value;
      c.appendChild(warn);
    }

    // -------------------------
    // Gallery Items
    // -------------------------
    const galleryItemsLayout = $("galleryItemsLayout").value || "list";
    if (galleryItems && galleryItems.length) {
      const container = document.createElement("div");
      switch (galleryItemsLayout) {
        case "grid":
          container.style.display = "grid";
          container.style.gridTemplateColumns = "repeat(auto-fit, minmax(120px, 1fr))";
          container.style.gap = "10px";
          break;
        case "large-grid":
          container.style.display = "grid";
          container.style.gridTemplateColumns = "repeat(auto-fit, minmax(200px, 1fr))";
          container.style.gap = "12px";
          break;
        case "mix":
          container.style.display = "grid";
          container.style.gridTemplateColumns = "repeat(auto-fit, minmax(120px, 1fr))";
          container.style.gap = "12px";
          break;
        default:
          container.style.display = "flex";
          container.style.flexDirection = "column";
          container.style.gap = "12px";
      }

      galleryItems.forEach(item => {
        const wrapper = document.createElement("div");
        wrapper.style.position = "relative";
        wrapper.style.marginBottom = "12px";

        const imgEl = document.createElement("img");
        imgEl.src = item.img;
        imgEl.style.width = "100%";
        imgEl.style.borderRadius = "6px";
        wrapper.appendChild(imgEl);

        const contentEl = document.createElement("div");
        contentEl.style.marginTop = "6px";

        if (item.link && item.mask) {
          const linkEl = document.createElement("a");
          linkEl.href = item.link;
          linkEl.target = "_blank";
          linkEl.textContent = item.mask;
          linkEl.style.textDecoration = "underline";
          linkEl.style.color = "#1976d2";

          const align = item.linkAlign || "center";
          if (align === "top") wrapper.insertBefore(linkEl, imgEl);
          else {
            contentEl.style.textAlign = ["left","right","center"].includes(align) ? align : "center";
            contentEl.appendChild(linkEl);
          }
        }

        if (item.desc) {
          const descP = document.createElement("p");
          descP.textContent = item.desc;
          descP.style.fontSize = "14px";
          descP.style.margin = "4px 0 0 0";
          contentEl.appendChild(descP);
        }

        wrapper.appendChild(contentEl);
        container.appendChild(wrapper);
      });

      c.appendChild(container);
    }

    // -------------------------
    // Videos
    // -------------------------
    // -------------------------
// Videos from Media Section
// -------------------------
const videoLinks = $("videoLinks").value.split(",").map(v => v.trim()).filter(Boolean);

videoLinks.forEach(link => {
  let videoEl;

  if (link.endsWith(".mp4") || link.endsWith(".webm")) {
    // Local / direct video
    videoEl = document.createElement("video");
    videoEl.src = link;
    videoEl.controls = true;
    videoEl.autoplay = false;
    videoEl.loop = false;
    videoEl.muted = false;
    videoEl.style.width = "100%";
    videoEl.style.borderRadius = "6px";
    videoEl.style.margin = "6px 0";
  } else if (link.includes("youtube.com") || link.includes("youtu.be")) {
    // YouTube video
    let videoId = link.includes("youtu.be")
      ? link.split("youtu.be/")[1]
      : link.split("v=")[1];
    if (videoId?.includes("&")) videoId = videoId.split("&")[0];

    if (videoId) {
      videoEl = document.createElement("iframe");
      videoEl.src = `https://www.youtube.com/embed/${videoId}?autoplay=0&controls=1&rel=0`;
      videoEl.width = "100%";
      videoEl.height = "315";
      videoEl.frameBorder = "0";
      videoEl.allow =
        "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      videoEl.allowFullscreen = true;
      videoEl.style.margin = "6px 0";
    }
  }

  if (videoEl) c.appendChild(videoEl);
});

    // -------------------------
    // Form Fields
    // -------------------------
    const fDiv = document.createElement("div");
    fDiv.style.display = "flex";
    fDiv.style.flexDirection = "column";
    fDiv.style.alignItems = $("btnPosition").value==="left"?"flex-start":$("btnPosition").value==="right"?"flex-end":"center";
    fDiv.style.gap = "8px";

    // Auth
    if ($("addAuth").checked) {
      fDiv.innerHTML += `<input placeholder="${$("usernamePlaceholder").value}">`;
      fDiv.innerHTML += `<input type="password" placeholder="${$("passwordPlaceholder").value}">`;
    }

    // Extra Fields
    $("extraFields").value.split("\n").map(f=>f.trim()).filter(Boolean).forEach(f=>{
      fDiv.innerHTML += `<input placeholder="${f}">`;
    });

    // Custom Fields
    customFields.forEach(fld => {
      const wrapper = document.createElement("div");
      wrapper.style.display="flex"; wrapper.style.flexDirection="column"; wrapper.style.marginBottom="8px";
      const input=document.createElement("input");
      input.type = fld.type;
      input.placeholder = fld.label;
      wrapper.appendChild(input);
      fDiv.appendChild(wrapper);
    });

    // ID Uploads
    if ($("chkIdFront").checked || $("chkIdBack").checked) {
      const idBox = document.createElement("div");
      idBox.style.padding="10px"; idBox.style.borderRadius="8px"; idBox.style.width="100%"; idBox.style.marginTop="10px";

      const frontUrl = $("idFrontFile")?.dataset.uploadedUrl;
      const backUrl  = $("idBackFile")?.dataset.uploadedUrl;

      if (frontUrl) { const img=document.createElement("img"); img.src=frontUrl; img.style.width="100%"; img.style.marginTop="6px"; img.style.borderRadius="6px"; idBox.appendChild(img);}
      if (backUrl) { const img=document.createElement("img"); img.src=backUrl; img.style.width="100%"; img.style.marginTop="6px"; img.style.borderRadius="6px"; idBox.appendChild(img); }

      if ($("chkIdFront").checked) { const lbl=document.createElement("label"); lbl.textContent=$("txtIdFront").value; const inp=document.createElement("input"); inp.type="file"; idBox.appendChild(lbl); idBox.appendChild(inp);}
      if ($("chkIdBack").checked) { const lbl=document.createElement("label"); lbl.textContent=$("txtIdBack").value; const inp=document.createElement("input"); inp.type="file"; idBox.appendChild(lbl); idBox.appendChild(inp); }

      fDiv.appendChild(idBox);
    }

    // Buttons
    if ($("showMainBtn").checked) {
      const btn=document.createElement("button");
      btn.style.background=$("btnColor").value; btn.style.color="#fff"; btn.style.padding="10px"; btn.style.border="none"; btn.style.borderRadius="8px";
      btn.textContent = $("buttonText").value; fDiv.appendChild(btn);
    }

    if ($("showGenerateBtn").checked) {
      const btn=document.createElement("button");
      btn.style.background="#1976d2"; btn.style.color="#fff"; btn.style.padding="10px"; btn.style.border="none"; btn.style.borderRadius="8px";
      btn.textContent = $("generateBtnText").value; fDiv.appendChild(btn);
    }

    c.appendChild(fDiv);

    // -------------------------
    // Extra Draggable Buttons
    // -------------------------
    extraButtons.forEach(b=>{
      if(!b.show) return;
      const btn=document.createElement("button");
      btn.className="draggableBtn"; btn.textContent=b.text;
      btn.style.background=b.color; btn.style.width=b.size+"px"; btn.style.height=b.size+"px";
      btn.style.position="absolute"; btn.style.left=b.x+"%"; btn.style.top=b.y+"%";
      btn.onmousedown=e=>{dragging=b; dx=e.offsetX; dy=e.offsetY;};
      btn.onclick=()=>window.open(b.link,"_blank");
      p.appendChild(btn);
    });

    // Footer
    const footer = document.createElement("footer");
    footer.style.textAlign="center"; footer.style.marginTop="10px"; footer.style.fontSize="12px";
    footer.textContent = $("footerText").value;
    c.appendChild(footer);

    p.appendChild(c);

    // -------------------------
    // Dragging logic
    // -------------------------
    document.onmousemove = e => { if(!dragging) return; const r=p.getBoundingClientRect(); dragging.x=((e.clientX-r.left-dx)/r.width)*100; dragging.y=((e.clientY-r.top-dy)/r.height)*100; renderPreview();};
    document.onmouseup = () => dragging=null;

  } catch(err) {
    console.error("Preview render error:", err);
  }
}

// Upload Front ID
$("idFrontFile").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  const ref = storage.ref(`uploads/${Date.now()}_${file.name}`);
  await ref.put(file);
  const url = await ref.getDownloadURL();
  e.target.dataset.uploadedUrl = url;
  renderPreview();
});

// Upload Back ID
$("idBackFile").addEventListener("change", async e => {
  const file = e.target.files[0];

  const url = await ref.getDownloadURL();
  e.target.dataset.uploadedUrl = url;
  renderPreview();
});
