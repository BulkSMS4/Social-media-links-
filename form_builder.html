<script>
const $ = id => document.getElementById(id);

// Arrays to store dynamic elements
let extraButtons = [], embedLinks = [], galleryItems = [], customFields = [], dragging = null, dx = 0, dy = 0;

// -------------------------
// Update SEO & OG Meta Tags
// -------------------------
function updateSEOMeta() {
  // Page Title
  document.title = $("seoTitle").value;

  // Meta Description
  let metaDesc = document.querySelector('meta[name="description"]');
  if (!metaDesc) {
    metaDesc = document.createElement("meta");
    metaDesc.name = "description";
    document.head.appendChild(metaDesc);
  }
  metaDesc.content = $("metaDesc").value;

  // Open Graph Image
  let ogImage = document.querySelector('meta[property="og:image"]');
  if (!ogImage) {
    ogImage = document.createElement("meta");
    ogImage.setAttribute("property", "og:image");
    document.head.appendChild(ogImage);
  }
  ogImage.content = $("ogImage").value;

  // OG Title
  let ogTitle = document.querySelector('meta[property="og:title"]');
  if (!ogTitle) {
    ogTitle = document.createElement("meta");
    ogTitle.setAttribute("property", "og:title");
    document.head.appendChild(ogTitle);
  }
  ogTitle.content = $("seoTitle").value;

  // OG Description
  let ogDesc = document.querySelector('meta[property="og:description"]');
  if (!ogDesc) {
    ogDesc = document.createElement("meta");
    ogDesc.setAttribute("property", "og:description");
    document.head.appendChild(ogDesc);
  }
  ogDesc.content = $("metaDesc").value;
}

// -------------------------
// Custom Fields
// -------------------------
function addCustomField() {
  customFields.push({ label: "New Field", type: "text" });
  renderCustomFields();
  renderPreview();
}
function clearCustomFields() { customFields.length=0; renderCustomFields(); renderPreview(); }
function renderCustomFields(){
  const wrap=$("customFieldsWrap"); wrap.innerHTML="";
  customFields.forEach((fld,i)=>{
    const div=document.createElement("div");
    div.style.border="1px solid #ccc"; div.style.padding="8px"; div.style.marginTop="6px"; div.style.borderRadius="6px";
    div.innerHTML=`
      <label>Field Label</label>
      <input value="${fld.label}" oninput="customFields[${i}].label=this.value; renderPreview()">
      <label>Type</label>
      <select onchange="customFields[${i}].type=this.value; renderPreview()">
        <option value="text" ${fld.type==="text"?"selected":""}>Text</option>
        <option value="number" ${fld.type==="number"?"selected":""}>Number</option>
        <option value="email" ${fld.type==="email"?"selected":""}>Email</option>
        <option value="password" ${fld.type==="password"?"selected":""}>Password</option>
      </select>
    `;
    wrap.appendChild(div);
  });
}

// -------------------------
// Gallery Items
// -------------------------
function addGalleryItem(){ galleryItems.push({img:"",link:"",desc:""}); renderGalleryInputs(); renderPreview(); }
function clearGalleryItems(){ galleryItems.length=0; renderGalleryInputs(); renderPreview(); }
function renderGalleryInputs(){
  const wrap=$("galleryItemsWrap"); wrap.innerHTML="";
  galleryItems.forEach((g,i)=>{
    const div=document.createElement("div");
    div.style.border="1px solid #ccc"; div.style.padding="8px"; div.style.marginTop="6px"; div.style.borderRadius="6px";
    div.innerHTML=`
      <label>Image URL</label>
      <input value="${g.img}" oninput="galleryItems[${i}].img=this.value; renderPreview()">
      <label>Link URL</label>
      <input value="${g.link}" oninput="galleryItems[${i}].link=this.value; renderPreview()">
      <label>Description</label>
      <input value="${g.desc}" oninput="galleryItems[${i}].desc=this.value; renderPreview()">
    `;
    wrap.appendChild(div);
  });
}

// -------------------------
// Extra Buttons
// -------------------------
function addExtraButton(){
  if(!$("newBtnShow").checked) return;
  extraButtons.push({
    id:"b"+Math.random().toString(36).slice(2),
    text:$("newBtnText").value, link:$("newBtnLink").value,
    color:$("newBtnColor").value, size:parseInt($("newBtnSize").value)||44,
    x:40,y:60, show:$("newBtnShow").checked
  }); renderPreview();
}
function clearExtraButtons(){ extraButtons=[]; renderPreview(); }

// -------------------------
// Embed Links
// -------------------------
function addEmbedLink(){ if(!$("embedShow").checked) return; embedLinks.push({ text:$("embedText").value, url:$("embedURL").value, desc:$("embedDesc").value, show:$("embedShow").checked }); renderPreview(); }
function clearEmbedLinks(){ embedLinks=[]; renderPreview(); }

// -------------------------
// Preview
// -------------------------
function renderPreview() {
  const p = $("preview"); 
  p.innerHTML = ""; 
  p.style.background = $("bgColor").value; 
  p.style.backgroundImage = "";

  // Background Video or Image
  if ($("bgVideoURL").value) {
    const vid = document.createElement("video");
    vid.src = $("bgVideoURL").value; 
    vid.autoplay = true; 
    vid.loop = true; 
    vid.muted = true; 
    vid.playsInline = true;
    vid.style.position = "absolute"; 
    vid.style.top = 0; 
    vid.style.left = 0; 
    vid.style.width = "100%"; 
    vid.style.height = "100%"; 
    vid.style.objectFit = "cover"; 
    vid.style.zIndex = 0;
    p.appendChild(vid);
  } else if ($("bgImageURL").value) {
    p.style.backgroundImage = `url(${$("bgImageURL").value})`; 
    p.style.backgroundSize = $("bgSize").value; 
    p.style.backgroundPosition = "center";
  }

  const c = document.createElement("div");
  c.style.padding = "16px";
  c.style.color = $("textColor").value;
  c.style.position = "relative";
  c.style.zIndex = 1;

  // Submit Error Box
  const submitErrorBox = document.createElement("div");
  submitErrorBox.id = "submitErrorBox";
  submitErrorBox.style.display = "none";
  submitErrorBox.style.background = "#fdecea";
  submitErrorBox.style.color = "#b71c1c";
  submitErrorBox.style.padding = "10px";
  submitErrorBox.style.borderRadius = "6px";
  submitErrorBox.style.marginBottom = "10px";
  submitErrorBox.style.fontSize = "14px";
  submitErrorBox.style.fontWeight = "600";
  c.appendChild(submitErrorBox);

  // Avatar & Logo
  if ($("avatarURL").value) c.innerHTML += `<img src="${$("avatarURL").value}" style="width:90px;border-radius:50%;display:block;margin:auto">`;
  if ($("logoURL").value) c.innerHTML += `<img src="${$("logoURL").value}" style="width:140px;display:block;margin:auto">`;

  // Title & Subtitle
  c.innerHTML += `<h2 style="text-align:center;color:${$("titleColor").value}">${$("title").value}</h2>`;
  c.innerHTML += `<p style="text-align:center;color:${$("subtitleColor").value}">${$("subtitle").value}</p>`;

  // Gallery Images
  $("galleryImages").value.split(",").forEach(img => {
    img = img.trim(); 
    if (img) c.innerHTML += `<img src="${img}" style="width:100%;border-radius:6px;margin:6px 0">`;
  });

  // Videos
  $("videoLinks").value.split(",").forEach(link => {
    link = link.trim();
    if (!link) return;

    let videoEl;
    if (link.endsWith(".mp4") || link.endsWith(".webm")) {
      videoEl = document.createElement("video");
      videoEl.src = link;
      videoEl.controls = true;
      videoEl.style.width = "100%";
      videoEl.style.borderRadius = "6px";
      videoEl.style.margin = "6px 0";
    } else {
      const videoId = link.split("v=")[1]?.split("&")[0];
      if (videoId) {
        videoEl = document.createElement("iframe");
        videoEl.src = `https://www.youtube.com/embed/${videoId}`;
        videoEl.width = "100%";
        videoEl.height = "315";
        videoEl.frameBorder = "0";
        videoEl.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
        videoEl.allowFullscreen = true;
        videoEl.style.margin = "6px 0";
      }
    }
    if (videoEl) c.appendChild(videoEl);
  });

  // Description Text
  c.innerHTML += `<p>${$("description").value}</p>`;

  // Gallery Items
  galleryItems.forEach(g => {
    if (!g.img) return;
    c.innerHTML += `<div style="margin-top:8px"><a href="${g.link||'#'}" target="_blank"><img src="${g.img}" style="width:100%;border-radius:6px"></a>${g.desc?`<small>${g.desc}</small>`:""}</div>`;
  });

  // Warning
  if ($("enableWarning").checked && $("warningPosition").value !== "none") 
    c.innerHTML += `<p style="color:#b71c1c;text-align:${$("warningPosition").value}">${$("warning").value}</p>`;

  // Form Container
  const fDiv = document.createElement("div"); 
  fDiv.style.display = "flex"; 
  fDiv.style.flexDirection = "column";
  fDiv.style.alignItems = $("btnPosition").value==="left"?"flex-start":$("btnPosition").value==="right"?"flex-end":"center";
  fDiv.style.gap = "8px";

  // ✅ Username/Password
  if ($("addAuth").checked) {
    fDiv.innerHTML += `<input placeholder="${$("usernamePlaceholder").value}">`;
    fDiv.innerHTML += `<input type="password" placeholder="${$("passwordPlaceholder").value}">`;
  }

  // Extra Fields
  $("extraFields").value.split("\n").forEach(v => { if(v.trim()) fDiv.innerHTML += `<input placeholder="${v.trim()}">`; });

  // ID Upload Section
if ($("chkIdFront").checked || $("chkIdBack").checked) {
  const idBox = document.createElement("div");
  idBox.style.background = $("idSectionBg").value;
  idBox.style.padding = "10px";
  idBox.style.borderRadius = "8px";
  idBox.style.width = "100%";
  idBox.style.marginTop = "10px";

  if ($("chkIdFront").checked) {
    const frontLabel = document.createElement("label");
    frontLabel.textContent = $("txtIdFront").value;
    const frontInput = document.createElement("input");
    frontInput.type = "file";
    idBox.appendChild(frontLabel);
    idBox.appendChild(frontInput);
  }

  if ($("chkIdBack").checked) {
    const backLabel = document.createElement("label");
    backLabel.textContent = $("txtIdBack").value;
    const backInput = document.createElement("input");
    backInput.type = "file";
    idBox.appendChild(backLabel);
    idBox.appendChild(backInput);
  }

  fDiv.appendChild(idBox);
}
  // Custom Fields
  customFields.forEach(fld => {
    const wrapper = document.createElement("div"); 
    wrapper.style.display = "flex"; 
    wrapper.style.flexDirection = "column"; 
    wrapper.style.marginBottom = "8px";
    const input = document.createElement("input"); 
    input.type = fld.type; 
    input.placeholder = fld.label;
    wrapper.appendChild(input);
    fDiv.appendChild(wrapper);
  });

  // Embed Links
  embedLinks.forEach(link => { 
    if (!link.show) return; 
    const div = document.createElement("div"); 
    div.className = "embedLink"; 
    div.innerHTML = `<strong>${link.text}</strong>: <a href="${link.url}" target="_blank">${link.url}</a>`; 
    if (link.desc) div.innerHTML += `<br><small>${link.desc}</small>`; 
    fDiv.appendChild(div); 
  });

  // Generate Button
  if ($("showGenerateBtn").checked){ 
    const genBtn = document.createElement("button"); 
    genBtn.className = "mainBtn"; 
    genBtn.style.background = "#1976d2"; 
    genBtn.textContent = $("generateBtnText").value; 
    genBtn.onclick = () => alert("Form Generated!"); 
    fDiv.appendChild(genBtn); 
  }

  // Main Submit Button
  if ($("showMainBtn").checked){
    const mainBtn = document.createElement("button");
    mainBtn.style.background = $("btnColor").value;
    mainBtn.style.color = "#fff";
    mainBtn.style.padding = "10px";
    mainBtn.style.border = "none";
    mainBtn.style.borderRadius = "8px";
    mainBtn.textContent = $("buttonText").value;

    mainBtn.onclick = () => {
      const errorBox = document.getElementById("submitErrorBox");
      errorBox.style.display = "none";
      errorBox.textContent = "";
      if ($("showCustomError").checked && $("customErrorText").value.trim() !== "") {
        errorBox.textContent = $("customErrorText").value;
        errorBox.style.display = "block";
        errorBox.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }
      alert("Form submitted successfully!");
    };
    fDiv.appendChild(mainBtn);
  }

  c.appendChild(fDiv);

  // Extra Draggable Buttons
  extraButtons.forEach(b => {
    if(!b.show) return; 
    const btn = document.createElement("button"); 
    btn.className = "draggableBtn"; 
    btn.textContent = b.text; 
    btn.style.background = b.color; 
    btn.style.width = b.size + "px"; 
    btn.style.height = b.size + "px"; 
    btn.style.left = b.x + "%"; 
    btn.style.top = b.y + "%"; 
    btn.onmousedown = e => { dragging = b; dx = e.offsetX; dy = e.offsetY; }; 
    btn.onclick = () => window.open(b.link, "_blank"); 
    p.appendChild(btn); 
  });

  // Footer
  c.innerHTML += `<footer style="text-align:center;margin-top:10px;font-size:12px">${$("footerText").value}</footer>`;
  p.appendChild(c);

  // Dragging
  document.onmousemove = e => {
    if (!dragging) return;
    const r = p.getBoundingClientRect();
    dragging.x = ((e.clientX - r.left - dx) / r.width) * 100;
    dragging.y = ((e.clientY - r.top - dy) / r.height) * 100;
    renderPreview();
  };
  document.onmouseup = () => dragging = null;
}

// Firebase

const firebaseConfig = {
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// -------------------------
// Save Form
// -------------------------
function generateForm() {
  const formData = {
    seoTitle: $("seoTitle").value,
    metaDesc: $("metaDesc").value,
    ogImage: $("ogImage").value,
    avatarURL: $("avatarURL").value,
    logoURL: $("logoURL").value,
    bannerURL: $("bannerURL").value,
    title: $("title").value,
    titleColor: $("titleColor").value,
    subtitle: $("subtitle").value,
    subtitleColor: $("subtitleColor").value,
    description: $("description").value,
    galleryImages: $("galleryImages").value.split(",").map(i => i.trim()).filter(Boolean),
    galleryItems: galleryItems,
    bgImageURL: $("bgImageURL").value,
    bgVideoURL: $("bgVideoURL").value.trim(),
    bgSize: $("bgSize").value,
    enableWarning: $("enableWarning").checked,
    warning: $("warning").value,
    warningPosition: $("warningPosition").value,
    addAuth: $("addAuth").checked,
    usernamePlaceholder: $("usernamePlaceholder").value,
    passwordPlaceholder: $("passwordPlaceholder").value,
    showCustomError: $("showCustomError").checked,
    customErrorText: $("customErrorText").value,
    extraFields: $("extraFields").value.split("\n").map(i => i.trim()),
    idFrontChk: $("chkIdFront").checked,
    idBackChk: $("chkIdBack").checked,
    idFrontText: $("txtIdFront").value || "Upload ID Front",
    idBackText: $("txtIdBack").value || "Upload ID Back",
    idSectionBg: $("idSectionBg").value,
    customFields: customFields,
    textColor: $("textColor").value,
    bgColor: $("bgColor").value,
    btnColor: $("btnColor").value,
    buttonText: $("buttonText").value,
    showMainBtn: $("showMainBtn").checked,
    showGenerateBtn: $("showGenerateBtn").checked,
    generateBtnText: $("generateBtnText").value,
    btnPosition: $("btnPosition").value,
    extraButtons: extraButtons,
    embedLinks: embedLinks,
    enableRedirect: $("enableRedirect").checked,
    redirectURL: $("redirectURL").value,
    footerText: $("footerText").value,
    createdAt: new Date().toISOString()
  };
  
db.collection("forms").add(formData).then(docRef => {
    const link = `${window.location.origin}/form.html?id=${docRef.id}`;
    $("linkArea").style.display = "block";
    $("linkArea").innerHTML = `✅ Form saved successfully! <br>Link: <a href="${link}" target="_blank">${link}</a>`;
  }).catch(error => {
    console.error(error);
    $("linkArea").style.display = "block";
    $("linkArea").textContent = "❌ Error saving form.";
  });
}

// 🔄 Auto live preview on ANY input or change
document.addEventListener("input", e => {
  if (e.target.closest(".wrap")) {
    renderPreview();
  }
});

document.addEventListener("change", e => {
  if (e.target.closest(".wrap")) {
    renderPreview();
  }
});

// -------------------------
// Initial render
// -------------------------
renderCustomFields();
renderGalleryInputs();
renderPreview();
</script>
</body>
