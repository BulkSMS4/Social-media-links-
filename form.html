<body>

<!-- BACKGROUND LAYERS -->
<video id="bgVideoLayer" muted autoplay loop playsinline></video>
<div id="bgImageLayer"></div>
<div id="bgColorLayer"></div>

<!-- FORM -->
<div id="formContainer">
  <div id="imageContainer" class="builder-media"></div>
  <h2 id="formTitle"></h2>
  <p id="formDesc"></p>
  <form id="dynamicForm"></form>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
/* ================= UTILS ================= */
const $ = id => document.getElementById(id);

/* ================= FIREBASE ================= */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

/* ================= FORM LOAD ================= */
const formId = new URLSearchParams(location.search).get("id");
if (!formId) {
  $("formTitle").innerText = "Form ID missing";
  throw new Error("Missing form ID");
}

db.collection("forms").doc(formId).get().then(doc => {
  if (!doc.exists) {
    $("formTitle").innerText = "Form not found";
    return;
  }
  renderForm(doc.data());
});

/* ================= BACKGROUND ================= */
function loadBackground(cfg){
  const video = $("bgVideoLayer");
  const image = $("bgImageLayer");
  const color = $("bgColorLayer");

  video.pause();
  video.src = "";
  video.style.display = "none";
  image.style.backgroundImage = "";
  color.style.backgroundColor = "";

  if (cfg.bgColor)
    color.style.backgroundColor = cfg.bgColor;

  if (cfg.bgImageURL)
    image.style.backgroundImage = `url(${cfg.bgImageURL})`;

  if (cfg.bgVideoURL) {
    video.src = cfg.bgVideoURL;
    video.style.display = "block";
    video.play().catch(()=>{});
  }
}

/* ================= RENDER FORM ================= */
function renderForm(cfg){
  const form = $("dynamicForm");
  const media = $("imageContainer");

  form.innerHTML = "";
  media.innerHTML = "";

  $("formTitle").innerText = cfg.title || "";
  $("formDesc").innerText = cfg.description || "";

  /* AVATAR & LOGO */
  if (cfg.avatarURL)
    media.innerHTML += `<img src="${cfg.avatarURL}" style="width:80px;border-radius:50%">`;

  if (cfg.logoURL)
    media.innerHTML += `<img src="${cfg.logoURL}">`;

  /* ===== GALLERY IMAGES ===== */
  (cfg.galleryImages || "").toString().split(",").forEach(url => {
    url = url.trim();
    if (!url) return;
    const img = document.createElement("img");
    img.src = url;
    img.style.width = "100%";
    img.style.borderRadius = "6px";
    form.appendChild(img);
  });

  /* ===== VIDEOS ===== */
  (cfg.videoLinks || "").toString().split(",").forEach(link => {
    link = link.trim();
    if (!link) return;

    let el;
    if (link.endsWith(".mp4")) {
      el = document.createElement("video");
      el.src = link;
      el.controls = true;
    } else if (link.includes("youtu")) {
      const id = link.split("v=")[1]?.split("&")[0] || link.split("youtu.be/")[1];
      if (!id) return;
      el = document.createElement("iframe");
      el.src = `https://www.youtube.com/embed/${id}`;
      el.allowFullscreen = true;
      el.height = 315;
    }

    if (el) {
      el.style.width = "100%";
      el.style.margin = "10px 0";
      form.appendChild(el);
    }
  });

  /* SUBMIT BUTTON */
  const btn = document.createElement("button");
  btn.textContent = cfg.buttonText || "Submit";
  btn.type = "button";
  btn.onclick = submitForm;
  form.appendChild(btn);

  /* APPLY BACKGROUND LAST */
  loadBackground(cfg);
}

/* ================= SUBMIT ================= */
function submitForm(){
  const data = {};
  document.querySelectorAll("#dynamicForm input, textarea")
    .forEach(i => data[i.name || "field"] = i.value);

  db.collection("submissions").add({
    formId,
    data,
    createdAt: new Date()
  });

  alert("Submitted");
  $("dynamicForm").reset();
}
</script>
</body>
