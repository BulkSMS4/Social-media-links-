<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Form</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:20px;
  margin:0;
}

/* ===== BACKGROUND ===== */
#bgVideoLayer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:-3;
  display:none;
}
#bgImageLayer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-2;
}
#bgColorLayer{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-1;
}

/* ===== FORM ===== */
#formContainer{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

.builder-media{text-align:center;margin-bottom:12px;}
.builder-media img{max-width:140px;margin:6px auto;display:block}

input, textarea, button{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  background:#1976d2;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>

<body>

<video id="bgVideoLayer" muted autoplay loop playsinline></video>
<div id="bgImageLayer"></div>
<div id="bgColorLayer"></div>

<div id="formContainer">
  <div id="imageContainer" class="builder-media"></div>
  <h2 id="formTitle"></h2>
  <p id="formDesc"></p>

  <form id="dynamicForm"></form>
</div>

<script>
const $ = id => document.getElementById(id);

/* FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

const formId = new URLSearchParams(location.search).get("id");
let formConfig = null;

if(!formId){
  $("formTitle").innerText = "Form ID missing";
}

/* LOAD FORM */
db.collection("forms").doc(formId).get().then(doc=>{
  if(!doc.exists){
    $("formTitle").innerText = "Form not found";
    return;
  }
  formConfig = doc.data();
  renderForm();
});

/* ===== BACKGROUND ===== */
function loadBackground(cfg){
  const bgVideo = $("bgVideoLayer");
  const bgImage = $("bgImageLayer");
  const bgColor = $("bgColorLayer");

  bgVideo.pause();
  bgVideo.src = "";
  bgVideo.style.display = "none";
  bgImage.style.backgroundImage = "";
  bgColor.style.backgroundColor = "";

  if(cfg.bgColor) bgColor.style.backgroundColor = cfg.bgColor;

  if(cfg.bgImageURL){
    bgImage.style.backgroundImage = `url(${cfg.bgImageURL})`;
    bgImage.style.backgroundSize = cfg.bgSize || "cover";
  }

  if(cfg.bgVideoURL && (cfg.bgVideoURL.endsWith(".mp4") || cfg.bgVideoURL.endsWith(".webm"))){
    bgVideo.src = cfg.bgVideoURL;
    bgVideo.style.display = "block";
    bgVideo.play().catch(()=>{});
  }
}

/* ===== RENDER ===== */
function renderForm(){
  $("formTitle").innerText = formConfig.title || "";
  $("formDesc").innerText = formConfig.description || "";

  const imgWrap = $("imageContainer");
  const form = $("dynamicForm");
  imgWrap.innerHTML = "";
  form.innerHTML = "";

  if(formConfig.avatarURL)
    imgWrap.innerHTML += `<img src="${formConfig.avatarURL}" style="width:90px;border-radius:50%">`;

  if(formConfig.logoURL)
    imgWrap.innerHTML += `<img src="${formConfig.logoURL}">`;

  /* ===== GALLERY IMAGES (MEDIA) ===== */
  if(formConfig.galleryImages){
    const imgs = Array.isArray(formConfig.galleryImages)
      ? formConfig.galleryImages
      : formConfig.galleryImages.split(",");

    imgs.forEach(url=>{
      if(!url.trim()) return;
      const img = document.createElement("img");
      img.src = url.trim();
      img.style.width = "100%";
      img.style.borderRadius = "6px";
      img.style.margin = "6px 0";
      form.appendChild(img);
    });
  }

  /* ===== VIDEOS (MEDIA) ===== */
  if(formConfig.videoLinks){
    const vids = Array.isArray(formConfig.videoLinks)
      ? formConfig.videoLinks
      : formConfig.videoLinks.split(",");

    vids.forEach(link=>{
      link = link.trim();
      if(!link) return;

      let el;
      if(link.endsWith(".mp4") || link.endsWith(".webm")){
        el = document.createElement("video");
        el.src = link;
        el.controls = true;
      } else {
        const id = link.includes("youtu")
          ? link.split("v=")[1]?.split("&")[0] || link.split("youtu.be/")[1]
          : null;
        if(id){
          el = document.createElement("iframe");
          el.src = `https://www.youtube.com/embed/${id}`;
          el.height = 315;
          el.allowFullscreen = true;
        }
      }
      if(el){
        el.style.width="100%";
        el.style.margin="6px 0";
        form.appendChild(el);
      }
    });
  }

  /* ===== SUBMIT BUTTON ===== */
  if(formConfig.buttonText){
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = formConfig.buttonText;
    btn.onclick = submitForm;
    form.appendChild(btn);
  }

  loadBackground(formConfig);
}

/* ===== SUBMIT ===== */
function submitForm(){
  const data = {};
  document.querySelectorAll("#dynamicForm input, textarea")
    .forEach(i=> data[i.name||"field"]=i.value);

  db.collection("submissions").add({
    formId,
    data,
    createdAt: new Date()
  });

  alert("Submitted successfully");
  $("dynamicForm").reset();
}
</script>
</body>
</html>
