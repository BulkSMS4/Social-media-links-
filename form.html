<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  font-family:Arial, sans-serif;
}

#bgVideoLayer,
#bgImageLayer {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  object-fit:cover;
}

#bgImageLayer {
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

#dynamicForm {
  position:relative;
  z-index:1;
  width:92%;
  max-width:850px;
  margin:40px auto;
  background:rgba(255,255,255,0.95);
  border-radius:12px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  box-sizing:border-box;
}

#dynamicForm img,
#dynamicForm video,
#dynamicForm iframe {
  max-width:100%;
  border-radius:8px;
  margin:8px 0;
}

#formTitle {
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:8px;
}

#formDesc {
  text-align:center;
  margin-bottom:20px;
  opacity:.8;
}

input, textarea, select, button {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
  box-sizing:border-box;
}

button {
  background:#1976d2;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:.2s;
}

button:hover {
  opacity:.9;
}

.successMessage {
  text-align:center;
  padding:20px;
  background:#e8f5e9;
  border-radius:8px;
  margin-top:15px;
  color:#2e7d32;
  font-weight:bold;
}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

</head>
<body>

<video id="bgVideoLayer" autoplay muted loop playsinline style="display:none;"></video>
<div id="bgImageLayer"></div>

<form id="dynamicForm">
  <h1 id="formTitle">Loading form...</h1>
  <p id="formDesc"></p>
</form>

<script>
const $ = id => document.getElementById(id);

/* =============================
   🔥 FIREBASE INIT
============================= */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});

const db = firebase.firestore();

/* =============================
   🔍 GET FORM ID
============================= */
const formId = new URLSearchParams(location.search).get("id");
const form = $("dynamicForm");

if (!formId) {
  form.innerHTML = "<p>Form ID missing.</p>";
  throw new Error("Form ID not provided");
}

/* =============================
   📦 LOAD FORM
============================= */
db.collection("forms").doc(formId).get()
.then(doc => {

  if (!doc.exists) {
    form.innerHTML = "<p>Form not found.</p>";
    return;
  }

  const data = doc.data();

  /* =============================
     🎨 BACKGROUND
  ============================= */
  const bgVideo = $("bgVideoLayer");
  const bgImage = $("bgImageLayer");

  if (data.bgVideoURL) {
    bgVideo.src = data.bgVideoURL;
    bgVideo.style.display = "block";
    bgImage.style.backgroundImage = "";
  } 
  else if (data.bgImageURL) {
    bgImage.style.backgroundImage = `url(${data.bgImageURL})`;
    bgImage.style.backgroundSize = data.bgSize || "cover";
    bgVideo.style.display = "none";
  }

  /* =============================
     📝 TITLE & DESCRIPTION
  ============================= */
  $("formTitle").innerText = data.title || "Form";
  $("formDesc").innerText = data.subtitle || "";

  /* =============================
     🖼 BRANDING
  ============================= */
  function addImage(url, width, round=false) {
    if (!url) return;
    const img = document.createElement("img");
    img.src = url;
    img.style.width = width;
    img.style.display = "block";
    img.style.margin = "0 auto 12px";
    if (round) img.style.borderRadius = "50%";
    form.appendChild(img);
  }

  addImage(data.avatarURL, "100px", true);
  addImage(data.logoURL, "150px");
  addImage(data.bannerURL, "100%");

  /* =============================
     🖼 GALLERY IMAGES
  ============================= */
  if (Array.isArray(data.galleryImages)) {
    data.galleryImages.forEach(url => {
      if (!url) return;
      const img = document.createElement("img");
      img.src = url;
      form.appendChild(img);
    });
  }

  /* =============================
     🖼 GALLERY ITEMS
  ============================= */
  if (Array.isArray(data.galleryItems)) {
    data.galleryItems.forEach(item => {
      const wrap = document.createElement("div");
      wrap.style.margin = "10px 0";

      if (item.img) {
        const img = document.createElement("img");
        img.src = item.img;
        wrap.appendChild(img);
      }

      if (item.link && item.mask) {
        const a = document.createElement("a");
        a.href = item.link;
        a.target = "_blank";
        a.textContent = item.mask;
        wrap.appendChild(a);
      }

      if (item.desc) {
        const p = document.createElement("p");
        p.textContent = item.desc;
        wrap.appendChild(p);
      }

      form.appendChild(wrap);
    });
  }

  /* =============================
     🎬 VIDEOS
  ============================= */
  if (Array.isArray(data.videoLinks)) {
    data.videoLinks.forEach(link => {

      if (!link) return;

      let el;

      if (/\.(mp4|webm)$/i.test(link)) {
        el = document.createElement("video");
        el.src = link;
        el.controls = true;
      }
      else if (link.includes("youtube") || link.includes("youtu.be")) {
        let id = link.split("v=")[1] || link.split("youtu.be/")[1];
        if (id && id.includes("&")) id = id.split("&")[0];

        el = document.createElement("iframe");
        el.src = "https://www.youtube.com/embed/" + id;
        el.height = "315";
        el.allowFullscreen = true;
      }

      if (el) form.appendChild(el);

    });
  }

  /* =============================
     📋 FORM FIELDS
  ============================= */
  if (Array.isArray(data.fields)) {
    data.fields.forEach(field => {

      const wrap = document.createElement("div");

      let input;

      if (field.type === "textarea") {
        input = document.createElement("textarea");
      } else {
        input = document.createElement("input");
        input.type = field.type || "text";
      }

      input.name = field.name || "";
      input.placeholder = field.placeholder || field.label || "";

      wrap.appendChild(input);
      form.appendChild(wrap);

    });
  }

  /* =============================
     🚀 SUBMIT BUTTON
  ============================= */
  const btn = document.createElement("button");
  btn.type = "submit";
  btn.textContent = data.buttonText || "Submit";
  form.appendChild(btn);

  /* =============================
     📤 SUBMIT HANDLER
  ============================= */
  form.addEventListener("submit", async function(e) {

    e.preventDefault();

    const formData = {};

    form.querySelectorAll("input, textarea, select")
      .forEach(el => {
        if (el.name) formData[el.name] = el.value;
      });

    await db.collection("submissions").add({
      formId: formId,
      data: formData,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    form.innerHTML += `
      <div class="successMessage">
        ✅ Submitted successfully!
      </div>
    `;

    form.reset();

  });

})
.catch(err => {
  console.error(err);
  form.innerHTML = "<p>Error loading form.</p>";
});
</script>

</body>
</html>
