<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Form</title>
<style>
body{ font-family: Arial,sans-serif; margin:0; padding:20px;}
#bgVideoLayer{position:fixed; inset:0;width:100vw;height:100vh; object-fit:cover; z-index:-3; display:none;}
#bgImageLayer{position:fixed; inset:0; background-size:cover; background-position:center; z-index:-2;}
#bgColorLayer{position:fixed; inset:0; z-index:-1;}
#formContainer{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.1);}
.builder-media{text-align:center;margin-bottom:12px;}
.builder-media img{max-width:140px;margin:6px auto;display:block;}
input,textarea,button{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button{background:#1976d2;color:#fff;border:none;cursor:pointer;}
.draggable{cursor:move; border:1px dashed #aaa; padding:6px; margin:6px 0;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<!-- Axios -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
<video id="bgVideoLayer" muted autoplay loop playsinline></video>
<div id="bgImageLayer"></div>
<div id="bgColorLayer"></div>

<div id="formContainer">
  <div id="imageContainer" class="builder-media"></div>
  <h2 id="formTitle"></h2>
  <p id="formDesc"></p>
  <form id="dynamicForm"></form>
</div>

<script>
const $ = id => document.getElementById(id);

/* FIREBASE INIT */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

const formId = new URLSearchParams(location.search).get("id");
let formConfig = null;
const CLOUDINARY_UPLOAD_PRESET = "form_upload_preset";
const CLOUDINARY_CLOUD_NAME = "dymwisuau";
const TELEGRAM_BOT = "YOUR_TELEGRAM_BOT_TOKEN";
const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID";
const ALERT_EMAIL = "youremail@example.com";

if(!formId){ $("formTitle").innerText="Form ID missing"; }

/* LOAD FORM CONFIG */
db.collection("forms").doc(formId).get().then(doc=>{
  if(!doc.exists){ $("formTitle").innerText="Form not found"; return; }
  formConfig = doc.data();
  renderForm();
});

/* ===== BACKGROUND ===== */
function loadBackground(cfg){
  const v=$("bgVideoLayer"), i=$("bgImageLayer"), c=$("bgColorLayer");
  v.pause(); v.src=""; v.style.display="none";
  i.style.backgroundImage=""; c.style.backgroundColor="";
  if(cfg.bgColor) c.style.backgroundColor=cfg.bgColor;
  if(cfg.bgImageURL){ i.style.backgroundImage=`url(${cfg.bgImageURL})`; i.style.backgroundSize=cfg.bgSize||"cover"; i.style.backgroundRepeat="no-repeat"; i.style.backgroundPosition="center"; }
  if(cfg.bgVideoURL){
    if(cfg.bgVideoURL.includes("youtube")||cfg.bgVideoURL.includes("youtu.be")){
      document.querySelectorAll(".yt-bg").forEach(e=>e.remove());
      let id=cfg.bgVideoURL.split("v=")[1]||cfg.bgVideoURL.split("youtu.be/")[1]; if(id){ id=id.split("&")[0];
        const iframe=document.createElement("iframe");
        iframe.className="yt-bg"; iframe.src=`https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0`;
        iframe.style.position="fixed"; iframe.style.inset="0"; iframe.style.width="100%"; iframe.style.height="100%"; iframe.style.zIndex="-3"; iframe.style.pointerEvents="none"; iframe.allow="autoplay";
        document.body.appendChild(iframe);
      }
    } else if(/\.(mp4|webm)$/i.test(cfg.bgVideoURL)){
      v.src=cfg.bgVideoURL; v.style.display="block"; v.muted=true; v.loop=true; v.play().catch(()=>{});
    }
  }
}

/* ===== RENDER FORM ===== */
function renderForm(){
  const form=$("dynamicForm"), media=$("imageContainer");
  form.innerHTML=""; media.innerHTML="";
  $("formTitle").innerText=formConfig.title||""; $("formDesc").innerText=formConfig.description||"";

  if(formConfig.avatarURL) media.innerHTML+=`<img src="${formConfig.avatarURL}" style="width:90px;border-radius:50%">`;
  if(formConfig.logoURL) media.innerHTML+=`<img src="${formConfig.logoURL}">`;

  // Gallery Items with drag
  if(Array.isArray(formConfig.galleryItems)){
    formConfig.galleryItems.forEach(item=>{
      if(!item||!item.img) return;
      const wrap=document.createElement("div"); wrap.className="draggable"; wrap.style.textAlign=item.linkAlign||"center";
      wrap.draggable=true;
      wrap.ondragstart=e=>{ e.dataTransfer.setData("text/plain", formConfig.galleryItems.indexOf(item)); }

      if(item.link && item.mask && wrap.style.textAlign==="top"){
        const a=document.createElement("a"); a.href=item.link; a.target="_blank"; a.textContent=item.mask; a.style.display="block"; a.style.marginBottom="6px"; a.style.color="#1976d2"; wrap.appendChild(a);
      }

      const img=document.createElement("img"); img.src=item.img; img.style.width="100%"; img.style.borderRadius="8px"; img.style.display="block"; wrap.appendChild(img);
      if(item.link && item.mask && wrap.style.textAlign!=="top"){ const a=document.createElement("a"); a.href=item.link; a.target="_blank"; a.textContent=item.mask; a.style.display="inline-block"; a.style.marginTop="6px"; a.style.color="#1976d2"; wrap.appendChild(a);}
      if(item.desc){ const p=document.createElement("p"); p.textContent=item.desc; p.style.margin="4px 0 0"; p.style.fontSize="14px"; wrap.appendChild(p);}
      form.appendChild(wrap);
    });
    // Drag & drop reordering
    form.addEventListener("dragover", e=>e.preventDefault());
    form.addEventListener("drop", e=>{
      e.preventDefault();
      const fromIndex=parseInt(e.dataTransfer.getData("text/plain"));
      const toIndex=[...form.querySelectorAll(".draggable")].indexOf(e.target.closest(".draggable"));
      if(toIndex>=0 && fromIndex!==toIndex){
        const moved=formConfig.galleryItems.splice(fromIndex,1)[0];
        formConfig.galleryItems.splice(toIndex,0,moved);
        renderForm(); // re-render after reorder
      }
    });
  }

  // Dynamic Fields
  if(Array.isArray(formConfig.fields)){
    formConfig.fields.forEach(field=>{
      const wrap=document.createElement("div"); wrap.style.margin="10px 0";
      if(field.label){ const label=document.createElement("label"); label.textContent=field.label; label.style.display="block"; label.style.marginBottom="4px"; wrap.appendChild(label);}
      let input, preview;
      if(field.type==="textarea"){ input=document.createElement("textarea"); input.rows=field.rows||4; }
      else if(field.type==="file"){
        input=document.createElement("input"); input.type="file"; if(field.accept) input.accept=field.accept;
        preview=document.createElement("div"); preview.style.marginTop="6px"; wrap.appendChild(preview);
        input.addEventListener("change", async e=>{
          preview.innerHTML=""; const file=e.target.files[0]; if(!file) return;
          const tempURL=URL.createObjectURL(file); let el;
          if(file.type.startsWith("image/")){ el=document.createElement("img"); el.src=tempURL; el.style.maxWidth="200px"; el.style.borderRadius="6px"; }
          else if(file.type.startsWith("video/")){ el=document.createElement("video"); el.src=tempURL; el.controls=true; el.style.maxWidth="200px"; el.style.borderRadius="6px"; }
          if(el) preview.appendChild(el);

          // Upload to Cloudinary
          const formData=new FormData();
          formData.append("file",file); formData.append("upload_preset",CLOUDINARY_UPLOAD_PRESET);
          try{ const res=await axios.post(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`,formData); input.dataset.cloudinaryUrl=res.data.secure_url; }catch(err){ console.error(err);}
        });
      } else { input=document.createElement("input"); input.type=field.type||"text"; }
      input.name=field.name; input.placeholder=field.placeholder||""; input.required=!!field.required; wrap.appendChild(input);
      form.appendChild(wrap);
    });
  }

  // Submit Button
  const btn=document.createElement("button"); btn.type="button"; btn.textContent=formConfig.buttonText||"Submit"; btn.onclick=submitForm; form.appendChild(btn);
  loadBackground(formConfig);
}

/* ===== SUBMIT ===== */
async function submitForm(){
  const data={};
  document.querySelectorAll("#dynamicForm input, textarea").forEach(i=>{
    if(i.name){ data[i.name]=(i.type==="file" && i.dataset.cloudinaryUrl)?i.dataset.cloudinaryUrl:i.value; }
  });
  await db.collection("submissions").add({ formId, data, createdAt:new Date() });

  // Telegram alert
  try{ await axios.post(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage`, { chat_id: TELEGRAM_CHAT_ID, text:`New submission for form ${formId}: ${JSON.stringify(data)}` }); }catch(e){ console.error(e); }

  // Email alert via EmailJS (or your preferred service)
  try{ await axios.post('/send-email', { to: ALERT_EMAIL, subject:`New Form Submission`, body:JSON.stringify(data)} ); }catch(e){ console.error(e); }

  alert("Submitted successfully");
  $("dynamicForm").reset();
}
</script>
</body>
</html>
